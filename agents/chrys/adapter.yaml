adapter_name: chrys
description: |
  Chrys agent adapter——shared `.agents` bridge bundle（AGENTS.md + .agents/skills/.agents/rules 跳板），
  headless = `chrys run`（`--agent Code --json`；非交互 bypass flag 待宿主侧 `chrys run --help` 核实后对齐 agent-invoke.ts）。

agent_entry_file:
  template_path: templates/AGENTS.md.template
  target_path: AGENTS.md

commands: null

skill_bridge:
  target_dir: .agents/skills
  template_dir: ../shared/agent-bundle/templates/skills-bridge

rules:
  target_dir: .agents/rules
  template_dir: ../shared/agent-bundle/templates/rules

user_confirmation:
  structured_widget: unsupported
  portable_required: true
  interaction_renderer_rule: templates/rules/interaction-renderer.md

# goal 宿主之一；chrys run headless 无确认读图能力（按实测定档 none）
image_input: none

goal_capability:
  mode: external_runner
  external_runner:
    headless_invoke: 'chrys run --task {{PROMPT_FILE}} -C {{PROJECT_ROOT}} --agent Code --json'
    unattended:
      write_mode: workspace-write
      approval_mode: never

post_install_hooks: []

notes: |
  - 独立 adapter；generic 恒 bridge（inline 已废弃），默认 `.agents` 根下 bundle **仅 generic 与 chrys** 字节一致、可幂等共存。
    （opencode 已改用自有 `.opencode/skill`，不再与 `.agents` 共享；见 agents/opencode/adapter.yaml。）
  - 仅 generic 配非默认 `agent_bundle_root`（如 `.codex`）时落不同目录，是独立产物（不共享、不互为幂等）。
  - rules 对 chrys 为「引用可达」非自动加载；运行时 headless 以 agent-invoke.ts 硬化为准。
  - 口径 SSOT：agents/adapter-schema.yaml（bridge-only）。
