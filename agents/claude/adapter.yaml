adapter_name: claude
description: |
  Claude Code adapter——入口文件命名为 CLAUDE.md（与 AGENTS.md 同源），
  并为每个 Skill 生成 .claude/commands/<slash>.md 路由文件，另外生成一份
  独立语义审查员 .claude/agents/verifier.md。slash 命令只做路由（跳到对应
  SKILL.md），不复述规则。

agent_entry_file:
  template_path: templates/AGENTS.md.template   # 共享模板；Claude Code 只是文件名用 CLAUDE.md
  target_path: CLAUDE.md

commands:
  target_dir: .claude/commands                  # 相对于实例工程根
  template_dir: templates/commands              # 相对于 adapter 目录
  subagents:
    target_dir: .claude/agents
    template_dir: templates/agents
    update_policy: auto_overwrite               # verifier 等为协议级子 agent 配置

skill_bridge: null

rules:
  target_dir: .claude/rules
  template_dir: templates/rules
  update_policy: prompt_if_changed


# Claude Code 的 .claude/settings.json：注册 Stop / SubagentStop / PreToolUse 等 hook，
# 是「弱模型工作流强制门」Layer 3 物理拦截的入口。原样拷贝，不做占位符替换。
settings_file:
  template_path: templates/settings.json        # 相对于 adapter 目录
  target_path: .claude/settings.json            # 相对于实例工程根
  update_policy: auto_overwrite                 # hooks 注册表，协议级

# Claude Code 的 .claude/hooks/*.mjs：由 settings_file 注册并由 Claude Code 进程触发，
# 通过 stdin 接收 JSON payload，通过 stderr + exit code 与客户端协议通信。
# 关键脚本：
#   - check-phase-completion.mjs（Stop hook，按 CLAUDE.md §5.1 四条件物理拦截"假完成"）
#   - record-verifier-report.mjs（SubagentStop hook，落地 verifier 子 agent 报告）
hooks:
  target_dir: .claude/hooks                     # 相对于实例工程根
  template_dir: templates/hooks                 # 相对于 adapter 目录
  update_policy: auto_overwrite                 # Stop hook 等与 harness 契约绑定

instance_skill_bridge:
  commands_target_dir: .claude/commands

user_confirmation:
  structured_widget: supported
  portable_required: true
  interaction_renderer_rule: templates/rules/interaction-renderer.md

# 多模态：Claude Read 工具可读 sidecar；交互 composer 与 claude -p headless 两态均 tool_read
image_input: tool_read

deprecated_artifacts:
  - path: rules/confirmation-ux.md
    action: backup_delete
    reason: "v4.0 起合并到 interaction-renderer.md"
  - path: rules/widget-options/
    action: backup_delete
    reason: "v4.0 起选项文案合入 confirmation-registry.yaml"

goal_capability:
  mode: native_goal
  native_goal:
    goal_condition_template: templates/goal-condition.md
    supports_resume: false
  external_runner:
    headless_invoke: 'claude -p "{{PROMPT}}" --allowedTools Bash,Read,Write,Edit,Glob,Grep --permission-mode dontAsk'
    unattended:
      write_mode: accept-edits
      approval_mode: never

post_install_hooks: []

notes: |
  - 提供 11 份 slash 路由模板：catalog-bootstrap（catalog-bootstrap / glossary-bootstrap）、
    goal-mode、code-graph、spec/plan/coding/code-review/business-ut/device-testing 六篇 feature skill、framework-init（framework-init.md）。个人 setup 无 slash，由阶段入口 `--ensure` 内联完成。
  - 模板里的 `../../framework/skills/<n>/SKILL.md` 相对路径假设 .claude/commands/
    在实例工程根下（与 `commands.target_dir` 一致），且仓库内含 `framework/` 子目录布局；移植时以本 adapter.yaml 的
    `target_*` 为准，不因具体业务仓名而异。
  - settings.json 里的 `${CLAUDE_PROJECT_DIR}` 是 Claude Code CLI 注入的运行时变量，
    指向实例工程根；不要把它误当成 framework 的 `{{PROJECT_NAME}}` 占位符——本
    adapter 的 settings_file / hooks 落地时**不做占位符替换**，原样拷贝。
  - hooks 脚本依赖 `framework/harness/state/.current-phase.json` 与
    `framework/harness/scripts/check-receipt.ts`，两者都是 framework 共通资产，
    与 adapter 解耦；因此 hook 脚本不需要在不同 adapter 间复制逻辑。
  - `.claude/rules/interaction-renderer.md`：Claude 交互渲染 **BLOCKER**；与 CLAUDE.md 同优先级。
