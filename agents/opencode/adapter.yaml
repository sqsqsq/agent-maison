adapter_name: opencode
description: |
  OpenCode CLI adapter——原生读 AGENTS.md + 自有 `.opencode/skill`（skill 自动注册为 slash 命令），
  headless = `opencode run`（stdin prompt，`--dangerously-skip-permissions`）。

agent_entry_file:
  template_path: templates/AGENTS.md.template
  target_path: AGENTS.md

commands: null

skill_bridge:
  target_dir: .opencode/skill
  template_dir: ../shared/agent-bundle/templates/skills-bridge

rules:
  target_dir: .opencode/rules
  template_dir: ../shared/agent-bundle/templates/rules

user_confirmation:
  structured_widget: unsupported
  portable_required: true
  interaction_renderer_rule: templates/rules/interaction-renderer.md

# opencode run stdin headless 无确认读图能力（按实测定档 none）
image_input: none

goal_capability:
  mode: external_runner
  external_runner:
    headless_invoke: 'opencode run --dangerously-skip-permissions --dir {{PROJECT_ROOT}}'
    unattended:
      write_mode: workspace-write
      approval_mode: never
      timeout_seconds: 3600

post_install_hooks: []

notes: |
  - 独立 adapter；skill 跳板物化到 opencode **自有原生目录** `.opencode/skill/<id>/SKILL.md`
    （opencode 长期稳定的主 skill 目录、兼容公司当前版本及传统原生目录；不依赖较新的 `.agents`
    外部 skill 发现，亦不碰用户的 `.opencode/opencode.json` 模型/凭据配置）。与 cursor 的「自有目录」模式一致。
  - **opencode 自动加载的只有**：`AGENTS.md`（instructions，根目录，与 generic/chrys/cursor 共享）
    + `.opencode/{skill,skills}/**/SKILL.md`（skill，自动注册为 `/<name>` slash 命令）。
    无需写 `.opencode/commands/`（显式命令才需）。skill 目录各用各的
    （opencode=`.opencode/skill`，generic/chrys=`.agents/skills`），落不同目录、互不冲突。
  - **`.opencode/rules/*` 不被 opencode 自动加载**（opencode 无 `.opencode/rules` 发现逻辑；`*.mdc`
    是 Cursor 格式，对 opencode 惰性）——与 chrys 的 `.agents/rules` 同性质，是**「引用可达」**的被动文档
    （由 skill / AGENTS.md 内容按需引用），**不是** opencode 有效规则入口。**禁止**为承载规则而擅自
    创建/覆盖用户的 `.opencode/opencode.json`。
  - 模型/凭据由 opencode 自身 config/auth（`~/.config/opencode` 或项目 `.opencode/opencode.json`）提供。
  - 运行时 headless stdin 灌 prompt，以 agent-invoke.ts 硬化为准。
  - **迁移**：UPDATE 会新增 `.opencode/skill`/`.opencode/rules`；旧版若曾物化到 `.agents`，该目录**不会自动删除**
    （未同时使用 generic/chrys 时可人工清理，避免 opencode 跨目录扫到同名 skill 仅 logWarning 的噪声）。
  - 口径 SSOT：agents/adapter-schema.yaml（bridge-only）。
