schema_version: "1.0"

# ---------------------------------------------------------------------------
# Framework Agent Adapter Schema
# ---------------------------------------------------------------------------
# 每个 adapter 都是 framework/agents/<adapter_name>/ 目录下的一个插件，
# 必须提供 adapter.yaml 文件（符合本 schema），并按需在 templates/ 下放置
# 将被初始化 Skill 消费的模板文件。
#
# 核心设计约束：
# 1. adapter 不承担任何 skill 逻辑——skill 本身是纯 Markdown，adapter 只负责
#    "按该 agent 的约定把 skill 入口暴露出来"（slash 命令 / 跳板文件 / rules）。
# 2. adapter 不写任何阶段规则——规则统一在 framework/specs/phase-rules/*.yaml。
# 3. adapter 不修改 framework/ 自身——它只产出**实例工程根**的文件。
# 4. 所有 target_path / target_dir 都是**相对于实例工程根**的路径；
#    所有 template_path / template_dir 都是**相对于仓库根（即 framework/ 的父目录）**
#    或**相对于 adapter 目录**的路径，见字段注释。
# ---------------------------------------------------------------------------

required_fields:

  adapter_name:
    type: string
    description: adapter 的唯一标识；必须与其所在目录名一致，例如 "generic" / "claude" / "cursor"

  description:
    type: string
    description: 面向用户（在初始化 Skill 里选 adapter 时）展示的一句话说明

  agent_entry_file:
    type: object
    description: agent 的入口说明文件（相当于当前仓库里的 CLAUDE.md / AGENTS.md）
    fields:
      template_path:
        type: string
        description: |
          模板文件位置，相对于 **framework/** 根。通常指向 framework/templates/ 下的
          共享模板（例如 "templates/AGENTS.md.template"），也允许 adapter 自带变体
          （指向 "agents/<name>/templates/<xxx>.template"）。
      target_path:
        type: string
        description: |
          生成到实例工程根的相对路径，例如 "AGENTS.md" / "CLAUDE.md"。
          **同一个工程一次只能激活一个 adapter**，因此 target_path 不能和其它 adapter
          的已落地产物冲突——若切换 adapter，初始化 Skill 必须先清理旧产物。
      update_policy:
        type: string | optional
        description: >
          UPDATE 模式下若将入口文件也纳入模板扫描策略时使用（少见）。
          缺省或未写等价于 prompt_if_changed（与其它段一致）。
        enum: ["auto_overwrite", "prompt_if_changed"]

optional_fields:

  commands:
    type: object | null
    description: |
      slash 命令路由文件（Claude Code 的 .claude/commands/*.md 是此字段的典型用例）。
      若 adapter 所依附的 agent 不支持 slash（例如 Cursor），置为 null。
    fields:
      target_dir:
        type: string
        description: 生成到实例工程根的目录，例如 ".claude/commands"
      template_dir:
        type: string
        description: |
          模板目录，相对于 **adapter 目录**（即 framework/agents/<name>/）。
          目录下每个 *.md 文件对应一个 slash 命令；文件名（去掉 .md）即 slash 名。
      subagents:
        type: object | null
        description: |
          可选。agent 支持子 agent 配置时使用（Claude Code 的 .claude/agents/*.md）。
        fields:
          target_dir:
            type: string
          template_dir:
            type: string
            description: 相对于 adapter 目录
          update_policy:
            type: string | optional
            description: >
              UPDATE 体检第 3 项：POPULATED 时是否免 y/n 自动对齐模板。
              auto_overwrite=机制代码（hooks/settings 等）；缺省或未写=prompt_if_changed（与用户入口一致，需 diff + y）。
            enum: ["auto_overwrite", "prompt_if_changed"]
      update_policy:
        type: string | optional
        description: >
          同上，作用于 slash commands 整块（不含 subagents）。
        enum: ["auto_overwrite", "prompt_if_changed"]

  skill_bridge:
    type: object | null
    description: |
      Skill 跳板目录（Cursor 的 .cursor/skills/<skill>/SKILL.md 是典型用例）。
      跳板本身不复述 skill 内容：只做 frontmatter 与**一条**跳转到
      framework/skills/<n>/SKILL.md 的链接。不得在跳板内追加业务条款、选型表或次级
      文档链接（会形成双源分叉，agent 易只读跳板漏掉正文中的 harness/verifier）。
      扩写必须在 framework/skills 正文及其 prompts/templates/reference；或修改
      framework/agents/shared/agent-bundle/templates/skills-bridge 后经 init/render 下发。
      若 agent 不需要跳板（例如 Claude Code 直接用 slash 加载），置为 null。
      **generic adapter**：`target_dir` 由 `framework.config.json` → `paths.agent_bundle_root`
      + `/skills` 在 harness 运行时解析；`bridge` 模式拷贝 skills-bridge，`inline` 模式由
      materialize-agent-bundle-skills 从 framework/skills 物化完整 SKILL。
    fields:
      target_dir:
        type: string
        description: 生成到实例工程根的目录，例如 ".cursor/skills"
      template_dir:
        type: string
        description: |
          模板目录，相对于 adapter 目录。目录下每个子目录对应一个 skill
          （目录名 = 实例工程里跳板目录名；其下放一个 SKILL.md）。
      update_policy:
        type: string | optional
        enum: ["auto_overwrite", "prompt_if_changed"]
        description: UPDATE 模式下 POPULATED 时对 Cursor 跳板是否自动覆盖模板（默认 prompt_if_changed）。

  rules:
    type: object | null
    description: |
      规则文件（Cursor 的 .cursor/rules/*.mdc 是典型用例）。
      若 agent 没有 rules 机制，置为 null。
    fields:
      target_dir:
        type: string
        description: 生成到实例工程根的目录，例如 ".cursor/rules"
      template_dir:
        type: string
        description: 相对于 adapter 目录
      update_policy:
        type: string | optional
        enum: ["auto_overwrite", "prompt_if_changed"]
        description: UPDATE 模式下 POPULATED 时对 rules 是否自动覆盖（默认 prompt_if_changed）。

  settings_file:
    type: object | null
    description: |
      Adapter 自身的客户端配置文件（Claude Code 的 .claude/settings.json 是典型用例，
      用于注册 Stop / SubagentStop / PreToolUse 等 hooks）。
      若 agent 不需要此类配置文件，置为 null。
      落地方式与 agent_entry_file 相同：原样复制，不做占位符替换
      （因此模板内必须使用 `${CLAUDE_PROJECT_DIR}` 这类客户端原生变量，不用 `{{...}}`）。
    fields:
      template_path:
        type: string
        description: 模板文件位置，相对于 adapter 目录，例如 "templates/settings.json"
      target_path:
        type: string
        description: 生成到实例工程根的相对路径，例如 ".claude/settings.json"
      update_policy:
        type: string | optional
        enum: ["auto_overwrite", "prompt_if_changed"]
        description: UPDATE 模式下 POPULATED 时是否备份后对齐 settings 模板（默认 prompt_if_changed）。

  hooks:
    type: object | null
    description: |
      Adapter 客户端 hook 脚本目录（Claude Code 的 .claude/hooks/*.mjs 是典型用例）。
      hook 脚本由 settings_file 注册并由客户端进程触发；framework 自身不直接调用。
      若 agent 没有 hooks 机制，置为 null。
      落地方式：将目录下所有文件原样复制（不做占位符替换；hook 脚本应通过 stdin
      或 `${CLAUDE_PROJECT_DIR}` 等运行时变量获取上下文）。
    fields:
      target_dir:
        type: string
        description: 生成到实例工程根的目录，例如 ".claude/hooks"
      template_dir:
        type: string
        description: 模板目录，相对于 adapter 目录，例如 "templates/hooks"
      update_policy:
        type: string | optional
        enum: ["auto_overwrite", "prompt_if_changed"]
        description: >
          UPDATE 模式下 POPULATED 时 hooks 是否与 framework 模板自动对齐；
          Claude Code 等对 hook 协议敏感时应声明 auto_overwrite。

  instance_skill_bridge:
    type: object | null
    description: |
      可选。声明 render-agents-md 渲染入口 Markdown 后，如何把 doc/extensions/skills/<slug>/SKILL.md
      暴露到 IDE（Cursor 跳板 / Claude slash）。generic adapter 的
      `skill_stub_target_dir` 由 `paths.agent_bundle_root` + `/skills` 在运行时解析。
      与内置 Skill 跳板或 slash 同名时自动加 ext- 前缀并 stderr 告警。
    fields:
      skill_stub_target_dir:
        type: string
        description: |
          Cursor：生成 .cursor/skills/<bridgeId>/SKILL.md 的根目录（实例相对路径），例如 ".cursor/skills"。
      commands_target_dir:
        type: string
        description: |
          Claude Code：生成 .claude/commands/<bridgeId>.md 的目录（实例相对路径），例如 ".claude/commands"。

  post_install_hooks:
    type: list
    default: []
    description: |
      可选。adapter 产物落地后需要执行的脚本列表（路径相对于 adapter 目录）。
      第一版保持为空，保留字段以便未来扩展（例如 adapter 切换时的清理、版本迁移等）。

  user_confirmation:
    type: object | null
    description: |
      可选。声明宿主 agent 是否支持结构化确认 widget（Cursor AskQuestion、Claude Code 原生选项等）。
      Skill 正文 SSOT：framework/skills/reference/user-confirmation-ux.md。
      generic / 内部 agent（chrys、codemate）应声明 structured_widget: unsupported。
    fields:
      structured_widget:
        type: string
        enum: ["supported", "unsupported"]
      widget_tool_hint:
        type: string
        description: |
          supported 时提示工具名，例如 AskQuestion（Cursor）或 native_options（Claude Code）。
      portable_required:
        type: boolean
        default: true
        description: |
          为 true 时：即使 structured_widget=supported，同轮消息仍须附 portable 编号菜单脚注。

  notes:
    type: string
    description: 给 adapter 维护者的备注

# ---------------------------------------------------------------------------
# 占位符约定（模板文件里使用的变量）
# ---------------------------------------------------------------------------
# 以下占位符由初始化 Skill（framework/skills/00-framework-init/）根据
# framework.config.json + 用户交互答复填充。adapter 模板里只可使用这组变量，
# 不允许内嵌业务硬编码。
# ---------------------------------------------------------------------------
placeholders:
  PROJECT_NAME:
    source: framework.config.json → project_name
  PROJECT_TYPE:
    source: framework.config.json → project_type  # "app" | "atomic_service"
  PROJECT_TYPE_LABEL:
    source: |
      由初始化 Skill 根据 framework.config.json → project_type 映射成展示文案：
        - "app"             → "应用工程"
        - "atomic_service"  → "元服务工程"
      新增 project_type 取值时在 framework/skills/00-framework-init/SKILL.md
      同步追加映射，保持与模板占位符一致。
  PROJECT_PROFILE_NAME:
    source: framework.config.json → project_profile.name；缺省或未配置时视同 hmos-app
  PROJECT_PROFILE_SUB_VARIANT:
    source: framework.config.json → project_profile.sub_variant（无则用「标准应用」；见 harness/config.ts DEFAULT_PROJECT_PROFILE_SUB_VARIANT_DISPLAY）
  PROFILE_AGENT_SSOT_ROWS:
    source: |
      渲染时从 framework/profiles/<project_profile.name>/templates/agents-md/agent-ssot-rows.partial.md 读入；
      文件不存在则回落 profiles/generic/agent-ssot-rows.partial.md。（由 render-agents-md.mjs 与 check-init 共用逻辑。）
  PROFILE_AGENT_GUARDRAILS:
    source: |
      同上目录 agent-guardrails.partial.md。
  AGENT_ADAPTER:
    source: framework.config.json → agent_adapter # 当前激活的 adapter 名
  AGENT_ENTRY_FILE:
    source: 当前 adapter.agent_entry_file.target_path
  ARCHITECTURE_SUMMARY:
    source: 由初始化 Skill 根据 architecture DSL 渲染的摘要
  FEATURES_DIR:
    source: framework.config.json → paths.features_dir
    # 阶段 9 合并：原 FEATURE_DOCS_DIR / FEATURE_SPECS_DIR 已收敛到本占位符。
    # 功能需求的所有产物（PRD.md / design.md / contracts.yaml / acceptance.yaml /
    # boundaries.yaml / review-report.md / test-plan.md / test-report.md）均扁平
    # 归档在 <FEATURES_DIR>/<feature>/ 下。
  MODULE_CATALOG_PATH:
    source: framework.config.json → paths.module_catalog
  GLOSSARY_PATH:
    source: framework.config.json → paths.glossary
  EXTENSION_SKILL_SECTION:
    source: |
      由 render-agents-md.ts 扫描 paths.extension_dir（默认 doc/extensions）下 skills/*/SKILL.md，
      渲染「实例扩展 Skill」Markdown 小节；无扩展时为空白。
  ARCHITECTURE_MD_PATH:
    source: framework.config.json → paths.architecture_md
