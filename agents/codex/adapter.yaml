adapter_name: codex
description: |
  OpenAI Codex CLI adapter——入口文件 AGENTS.md，bundle 根目录默认 `.codex`（由
  framework.config.json paths.agent_bundle_* 配置）。goal_capability 支持原生 /goal
  与 external_runner（codex exec）双路径；第一版以 goal-runner + codex exec 为主。

agent_entry_file:
  template_path: templates/AGENTS.md.template
  target_path: AGENTS.md

commands: null

skill_bridge:
  target_dir: .codex/skills
  template_dir: ../shared/agent-bundle/templates/skills-bridge

rules:
  target_dir: .codex/rules
  template_dir: ../shared/agent-bundle/templates/rules

user_confirmation:
  structured_widget: unsupported
  portable_required: true
  interaction_renderer_rule: templates/rules/interaction-renderer.md

# codex exec 读图能力待实测；默认定档 none
image_input: none

goal_capability:
  mode: native_goal
  native_goal:
    goal_condition_template: templates/goal-condition.md
    supports_resume: true
  external_runner:
    headless_invoke: 'codex exec --sandbox workspace-write --ask-for-approval never "{{PROMPT}}"'
    unattended:
      write_mode: workspace-write
      approval_mode: never

post_install_hooks: []

notes: |
  - 与 generic 类似，但 bundle 默认落 `.codex/skills`；非标路径须编辑 framework.config.json。
  - native /goal 第一版仅 metadata + 条件模板占位；闭环裁决由 goal-runner + harness 承担。
