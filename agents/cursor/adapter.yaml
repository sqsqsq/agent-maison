adapter_name: cursor
description: |
  Cursor adapter——入口文件保持为 AGENTS.md（Cursor 会自动加载），另外为每个
  Skill 生成 `.cursor/skills/<skill>/SKILL.md` 跳板，并落一份
  `.cursor/rules/framework.mdc` 总规则索引。跳板只做 metadata 声明 + **一条**
  跳转，不复述 skill 逻辑；不得在跳板内追加业务条款 / 选型表 / 次级链接（免双源分叉）。

# 多模态：Cursor Composer 原生支持 Read 图片；harness collectContextFiles 注入 authoritative_refs 图片字节
multimodal: true

agent_entry_file:
  template_path: templates/AGENTS.md.template   # 共享模板（相对于 framework/ 根）
  target_path: AGENTS.md

# G6：为 Cursor 生成与 claude 对等的整套 slash Command 产物（.cursor/commands/<slash>.md），
# 既给 Cursor 用户能力对等（/spec /plan /coding 等原生命令），又消除"Cursor 误读同名
# .claude/commands/*.md 当 /<cmd>"的触发面。模板为薄入口（路由到 framework SKILL、不复述逻辑、
# 不带 claude 身份）；唯 goal-mode 额外内嵌 RESOLVED_ADAPTER: cursor（唯一携带运行身份的 slash）。
commands:
  target_dir: .cursor/commands                  # 相对于实例工程根
  template_dir: templates/commands              # 相对于 adapter 目录

skill_bridge:
  target_dir: .cursor/skills                    # 相对于实例工程根
  template_dir: ../shared/agent-bundle/templates/skills-bridge

instance_skill_bridge:
  skill_stub_target_dir: .cursor/skills

user_confirmation:
  structured_widget: supported
  portable_required: true
  interaction_renderer_rule: templates/rules/interaction-renderer.mdc

rules:
  target_dir: .cursor/rules
  template_dir: ../shared/agent-bundle/templates/rules

# G1b（plan e8f5a2c7）：framework 写保护 preToolUse 守卫的结构化物化。
# **刻意不用 settings_file/hooks 字段**：①settings_file 是 verbatim 整文件覆盖——
# .cursor/hooks.json 是宿主原生共享配置（团队可能已有自己的 hooks），整文件覆盖会吞宿主
# 资产，hooks_config 走结构化 upsert（仅增改 framework 自有条目，ownership key=command
# 路径，第三方条目/顶层/未知字段一律保留，JSON 非法绝不覆盖）；②settings_file+hooks 双
# 字段会被 resolveEnforcementTier 判为 hard_hook（=Stop/correction 链路语义），cursor 仅
# 有写守卫不够格——hooks_config 是独立字段，tier 保持 soft_rule_only（回归测试钉死）。
# hook 脚本不物化：hooks.json command 直接调发布件内
# framework/agents/cursor/hooks/guard-framework-write.mjs。
hooks_config:
  template_path: templates/hooks.json           # 相对于 adapter 目录（仅含 framework 自有条目）
  target_path: .cursor/hooks.json               # 相对于实例工程根（宿主共享文件，结构化合并）
  update_policy: auto_overwrite                 # 语义=每次 UPDATE 自动 reconcile 自有条目（非整文件覆盖）

goal_capability:
  mode: external_runner
  external_runner:
    # Declarative only for capability validation. Runtime SSOT: agent-invoke.ts cursorHeadlessPlan (cursor-agent|agent -p, stdin).
    headless_invoke: 'cursor-agent -p --force --trust "{{PROMPT}}"'
    unattended:
      write_mode: workspace-write
      approval_mode: on-request

post_install_hooks: []

notes: |
  - Skill 跳板模板 SSOT：`framework/agents/shared/agent-bundle/templates/skills-bridge/`。
  - 10 份内置 skill 跳板（含 `framework-init`、`goal-mode`、`code-graph`）；`catalog-bootstrap` 的 Phase A/B 合用一份跳板。
  - 跳板 `name` 必须与目录名一致（扁平 skill id，如 `framework-init`、`coding`）。
  - 个人 setup 无独立 skill 跳板：各阶段入口 `check-personal-setup.ts --json --ensure`（见 personal-setup-gate.md）。
