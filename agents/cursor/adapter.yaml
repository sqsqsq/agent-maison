adapter_name: cursor
description: |
  Cursor adapter——入口文件保持为 AGENTS.md（Cursor 会自动加载），另外为每个
  Skill 生成 `.cursor/skills/<skill>/SKILL.md` 跳板，并落一份
  `.cursor/rules/framework.mdc` 总规则索引。跳板只做 metadata 声明 + **一条**
  跳转，不复述 skill 逻辑；不得在跳板内追加业务条款 / 选型表 / 次级链接（免双源分叉）。

agent_entry_file:
  template_path: templates/AGENTS.md.template   # 共享模板（相对于 framework/ 根）
  target_path: AGENTS.md

commands: null

skill_bridge:
  target_dir: .cursor/skills                    # 相对于实例工程根
  template_dir: ../shared/agent-bundle/templates/skills-bridge

instance_skill_bridge:
  skill_stub_target_dir: .cursor/skills

user_confirmation:
  structured_widget: supported
  portable_required: true
  interaction_renderer_rule: templates/rules/interaction-renderer.mdc

rules:
  target_dir: .cursor/rules
  template_dir: ../shared/agent-bundle/templates/rules

post_install_hooks: []

notes: |
  - Skill 跳板模板 SSOT：`framework/agents/shared/agent-bundle/templates/skills-bridge/`。
  - 8 份内置 skill 跳板；`0-catalog-bootstrap` 的 Phase A/B 合用一份跳板。
  - 跳板 `name` 必须与目录名一致（含 `00-`/`0-` 数字前缀）。
