adapter_name: generic
description: |
  通用 adapter——产出 AGENTS.md，并在 bundle 根目录（默认 `.agents`；非标如 `.codex`
  须手动编辑 config）下生成 `skills/` 与 `rules/`。**恒 bridge** 薄跳板（inline 已废弃）。
  bundle 根目录由 `framework.config.json` → `paths.agent_bundle_*` 配置。

agent_entry_file:
  template_path: templates/AGENTS.md.template
  target_path: AGENTS.md

commands: null

skill_bridge: null

rules:
  target_dir: .agents/rules
  template_dir: ../shared/agent-bundle/templates/rules

instance_skill_bridge: null

user_confirmation:
  structured_widget: unsupported
  portable_required: true
  interaction_renderer_rule: templates/rules/interaction-renderer.md

# headless 管道接内网盲模型，无读图工具
image_input: none

goal_capability:
  mode: external_runner
  external_runner:
    headless_invoke: '{{PROMPT}} | agent-cli -'
    unattended:
      write_mode: workspace-write
      approval_mode: on-request

post_install_hooks: []

notes: |
  - `paths.agent_bundle_root`（默认 `.agents`）由 init 用 template/默认值写入 framework.config.json；
    仅非标 bundle 根须手动编辑 config 后重跑（禁止对话收路径字符串）。
  - **恒 bridge**：`agent_bundle_skill_mode` 经 normalize 一律归一为 bridge（inline 已废弃）。
  - bridge：拷贝 shared/skills-bridge（10 份；个人 setup 由阶段 `--ensure` 内联）。
  - 模板 SSOT：framework/agents/shared/agent-bundle/templates/
