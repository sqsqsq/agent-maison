schema_version: "1.0"
name: spec-driven
description: >
  Default harness workflow — mirrors legacy VALID_PHASES / phase DAG before optional
  instance extensions phase. Global phases have no deps; feature phases follow
  catalog+glossary → PRD → design → coding → (review | UT parallel) → testing.
#
# Phase transition (agent UX, not harness runtime):
#   default transition_policy: manual — see framework/docs/concepts/phase-transition-policy.md
#   future transition_policy: goal_mode | batch_authorized | manual
#   future auto_chain: [prd, design, coding, review, ut, testing]

artifacts:
  - id: extensions
    scope: global
    check: check-extensions.ts
    rule: phase-rules/extensions-rules.yaml
    requires: []

  - id: init
    scope: global
    check: check-init.ts
    rule: phase-rules/init-rules.yaml
    requires: []
    skill_doc: ../skills/00-framework-init/SKILL.md

  - id: catalog
    scope: global
    check: check-catalog.ts
    rule: phase-rules/catalog-rules.yaml
    requires: []
    skill_doc: ../skills/0-catalog-bootstrap/SKILL.md

  - id: glossary
    scope: global
    check: check-glossary.ts
    rule: phase-rules/glossary-rules.yaml
    requires: []
    skill_doc: ../skills/0-catalog-bootstrap/SKILL.md

  - id: docs
    scope: global
    check: check-docs.ts
    rule: phase-rules/docs-rules.yaml
    requires: []

  - id: prd
    scope: feature
    check: check-prd.ts
    rule: phase-rules/prd-rules.yaml
    requires: [catalog, glossary]
    verifier_prompt: prompts/verify-prd.md
    skill_doc: ../skills/1-prd-design/SKILL.md

  - id: design
    scope: feature
    check: check-design.ts
    rule: phase-rules/design-rules.yaml
    requires: [prd]
    verifier_prompt: prompts/verify-design.md
    skill_doc: ../skills/2-requirement-design/SKILL.md

  - id: coding
    scope: feature
    check: check-coding.ts
    rule: phase-rules/coding-rules.yaml
    requires: [design]
    verifier_prompt: prompts/verify-coding.md
    skill_doc: ../skills/3-coding/SKILL.md

  - id: review
    scope: feature
    check: check-review.ts
    rule: phase-rules/review-rules.yaml
    requires: [coding]
    verifier_prompt: prompts/verify-review.md
    skill_doc: ../skills/4-code-review/SKILL.md

  - id: ut
    scope: feature
    check: check-ut.ts
    rule: phase-rules/ut-rules.yaml
    requires: [coding]
    verifier_prompt: prompts/verify-ut.md
    skill_doc: ../skills/5-business-ut/SKILL.md

  - id: testing
    scope: feature
    check: check-testing.ts
    rule: phase-rules/testing-rules.yaml
    requires: [ut]
    verifier_prompt: prompts/verify-testing.md
    skill_doc: ../skills/6-device-testing/SKILL.md
