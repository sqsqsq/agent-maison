schema_version: "1.0"
description: >
  Goal run manifest — consumed by harness/scripts/utils/goal-manifest.ts and goal-runner.ts.
  SSOT for unattended full-chain automation parameters.

fields:
  start_phase:
    type: string
    default: spec
    description: Inclusive start feature phase
  end_phase:
    type: string
    default: testing
    description: Inclusive end feature phase
  feature:
    type: string
    required: true
    description: Feature slug under doc/features/
  requirement:
    type: string
    description: User requirement text or path to requirement file
  adapter:
    type: string
    description: >
      Effective agent adapter (运行身份). 权威 SSOT 为 framework.local.json agent_adapter；
      与之冲突的 --adapter 会被 goal-runner 阻断（除非 --override-adapter）。
  adapter_provenance:
    type: string
    enum: [user_explicit, entry_declared, local_config, registry, override]
    description: >
      运行身份来源（诚实化回溯）：local_config=取自 framework.local.json SSOT；
      override=经 --override-adapter 显式切换并回写 local；user_explicit/entry_declared/registry=
      首启无 local 时由解析阶梯（用户显式 / 跳板入口声明 / registry 交互）产出的 requested。旧 manifest 可缺省。
  chain_override:
    type: array
    items: string
    description: Optional ordered phase list overriding workflow auto_chain
  budget:
    type: object
    properties:
      max_retries_per_phase: { type: integer, default: 2 }
      max_total_turns: { type: integer, default: 30 }
      # 实际生效 wall 由 utils/goal-timeout.resolveWallClockMinutes 派生：
      # max(本值, ceil(Σ链路 per-phase 秒/60)+缓冲)，保证全链单次满预算能跑完。
      wall_clock_minutes: { type: integer, default: 480 }
  dependency_policy:
    type: object
    properties:
      deferrable_blocking_classes:
        type: array
        default: [externalBlocked]
      deferrable_failure_kinds:
        type: array
        default: [device_blocked]
      propagate_to_downstream: { type: boolean, default: true }
  unattended:
    type: object
    required_for_runner: true
    properties:
      write_mode: { type: string, enum: [workspace-write, accept-edits, full-access] }
      approval_mode: { type: string, enum: [never, on-request, always] }
      max_turns: { type: integer }
      # 扁平全局超时（秒）；per-phase 未命中时的兜底。
      timeout_seconds: { type: integer }
      # 显式 per-phase 超时覆盖（秒），最高优先；缺省走 goal-timeout 内置默认表
      # （spec 900 / plan 5400 / coding 5400 / review 7200 / ut 3600 / testing 7200）。
      phase_timeout_seconds:
        type: object
        properties:
          spec: { type: integer }
          plan: { type: integer }
          coding: { type: integer }
          review: { type: integer }
          ut: { type: integer }
          testing: { type: integer }
      allowed_tools: { type: array, items: string }
  run_id:
    type: string
    description: UUID or timestamp slug; auto-generated if omitted
  report_dir:
    type: string
    default: doc/features/<feature>/goal-runs/<run-id>
