# ----------------------------------------------------------------------------
# hmos-app phase-rules overlay（合并到 framework/specs/phase-rules/plan-rules.yaml 骨架之上）
# ----------------------------------------------------------------------------

# ============================================================================
# Plan 阶段规约 (Phase Rules)
# ============================================================================
# 定义实现计划（plan）（plan 产出）必须满足的通用规则。
# 适用于所有功能模块的 doc/features/{module}/plan/plan.md。
#
# 消费者:
#   - framework/harness/scripts/check-plan.ts  (脚本 Harness, 确定性检查)
#   - framework/harness/prompts/verify-plan.md (AI Harness, 语义级检查)
# ============================================================================

phase: plan
version: "1.0"
applies_to: "doc/features/{module}/plan/plan.md"

# --------------------------------------------------------------------------
# 结构约束 — 脚本 Harness 可自动检测
# --------------------------------------------------------------------------
structure_checks:

  required_chapters:
    description: >
      设计文档必须包含以下 9 个章节：
      Scope 声明与继承、模块架构图、目录/文件结构规划、数据模型定义、页面组件树、
      状态管理方案、服务层接口定义、路由/导航设计、功能映射表
    severity: BLOCKER
    rule:
      expected_headings:
        - "Scope 声明"
        - "模块架构图"
        - "目录/文件结构规划"
        - "数据模型定义"
        - "页面组件树"
        - "状态管理方案"
        - "服务层接口定义"
        - "路由/导航设计"
        - "功能映射表"
      match: "heading_text_contains"

  scope_declaration:
    description: >
      「Scope 声明与继承」章节必须包含 yaml 代码块，
      定义 inherited_from_prd（legacy yaml 键名，机器字段保留）/
      in_scope_modules / out_of_scope_modules /
      rationale / expansions_with_user_approval 字段；
      in_scope_modules 至少 1 项。
    severity: BLOCKER
    rule:
      section: "Scope 声明"
      expect: "yaml_code_block"
      required_keys:
        - "in_scope_modules"
        - "out_of_scope_modules"
        - "rationale"
      min_items:
        in_scope_modules: 1

  scope_consistency_with_spec:
    description: >
      plan.in_scope_modules 必须是 spec.in_scope_modules ∪
      expansions_with_user_approval.modules 的子集；
      plan 不得在未经用户批准的情况下声明 spec.out_of_scope_modules 中的模块。
      这是阻止 AI 自行扩大需求范围的核心 Scope 守门规则。
    severity: BLOCKER
    rule:
      source: "doc/features/{module}/spec/spec.md > Scope 声明 > yaml"
      target: "doc/features/{module}/plan/plan.md > Scope 声明与继承 > yaml"
      assertions:
        - "plan.in_scope_modules ⊆ (spec.in_scope_modules ∪ plan.expansions_with_user_approval.modules)"
        - "plan.in_scope_modules ∩ spec.out_of_scope_modules ⊆ plan.expansions_with_user_approval.modules"

  architecture_impact_declared:
    description: >
      plan.md 必须在 Scope 节（或其子节）声明「架构影响声明 (architecture_impact)」，
      包含合法的 impact 枚举与配套字段，作为后续 plan_to_architecture /
      architecture_doc_consistency 规则的前置触发开关。
      impact 合法取值：none | dsl_change | module_set_change | responsibility_rewrite。
      架构级变更的准确定义见 framework/skills/feature/plan/SKILL.md Step 12。
    severity: BLOCKER
    rule:
      section: "架构影响声明"
      expect: "yaml_code_block"
      required_keys:
        - "impact"
        - "affected_items"
        - "architecture_md_updates"
        - "catalog_updates"
      allowed_values:
        impact:
          - "none"
          - "dsl_change"
          - "module_set_change"
          - "responsibility_rewrite"
      conditional_required:
        # impact != none 时 affected_items 与 architecture_md_updates 不允许为空
        - when: "impact != 'none'"
          non_empty:
            - "affected_items"
            - "architecture_md_updates"

  architecture_diagram:
    description: >
      「模块架构图」章节必须包含至少一个 Mermaid 代码块，
      展示模块间依赖关系
    severity: BLOCKER
    rule:
      section: "模块架构图"
      expect: "mermaid_block"

  module_change_table:
    description: >
      必须包含模块变更摘要表，列明每个涉及模块的所属层、物理路径、
      格式（HAP/HAR/HSP）、变更类型（新增/修改/迁移）
    severity: BLOCKER
    rule:
      expect: "markdown_table"
      required_columns:
        - '"模块" or "Module"'
        - "所属层"
        - "格式"
        - "变更类型"

  file_structure_per_module:
    description: >
      每个涉及的模块必须有目录/文件结构规划，精确到 .ets 文件路径，
      使用代码块展示树形结构
    severity: BLOCKER
    rule:
      section: "目录/文件结构规划"
      per_module:
        expect: "code_block_with_tree"

  data_model_typed:
    description: >
      数据模型定义必须使用 TypeScript/ArkTS 代码块，
      包含字段名、类型、说明；不允许使用 any 类型
    severity: BLOCKER
    rule:
      section: "数据模型定义"
      expect: "typescript_code_block"
      forbidden_types: ["any"]

  interface_signatures_complete:
    description: >
      服务层接口定义中，所有方法必须包含完整的方法签名：
      方法名、入参（名+类型）、返回类型、是否异步
    severity: BLOCKER
    rule:
      section: "服务层接口定义"
      per_method:
        required_fields:
          - "method_name"
          - "parameters_with_types"
          - "return_type"

  component_tree_per_page:
    description: >
      每个页面必须有对应的组件树，使用树形文本图展示层级关系
    severity: MAJOR
    rule:
      section: "页面组件树"
      per_page:
        expect: "tree_diagram"

  spec_mapping_table:
    description: >
      「spec 功能映射表」必须是 Markdown 表格，至少包含
      spec 编号、功能名称、优先级、实现模块、关键文件 五列
    severity: BLOCKER
    rule:
      section: "spec 功能映射表"
      expect: "markdown_table"
      required_columns:
        - '"spec 编号" or "spec 功能编号"'
        - "功能名称"
        - "优先级"
        - "实现模块"
        - "关键文件"

  state_management_table:
    description: >
      「状态管理方案」章节必须包含状态分类表，列明数据、作用域、
      使用的装饰器/机制、持有者
    severity: MAJOR
    rule:
      section: "状态管理方案"
      expect: "markdown_table"
      required_columns:
        - "数据"
        - '"装饰器" or "机制"'

  route_design_table:
    description: >
      「路由/导航设计」章节必须包含页面跳转关系表或 Mermaid 图，
      明确每个 NavDestination 页面的名称和所属模块
    severity: MAJOR
    rule:
      section: "路由/导航设计"
      expect_any_of: ["markdown_table", "mermaid_block"]

  metadata_header:
    description: >
      设计文档顶部必须包含模块标识、对应 spec 路径、版本、状态等元数据
    severity: MINOR
    rule:
      expect: "blockquote_metadata"
      required_fields:
        - "模块标识"
        - "对应 spec"
        - "版本"
        - "状态"

  visual_parity_coverage:
    description: >
      ui_change 要求 UI 时 plan 须产出 plan/visual-parity.yaml，映射 ui-spec 每个
      asset key / token key 到 contracts.resource_keys 与 components。
    severity: MAJOR
    rule:
      expect: "visual_parity_yaml"
      enforcement_config: "framework.config.json#coding.visual_parity_enforcement"

# --------------------------------------------------------------------------
# 语义约束 — AI Harness 做语义级检查
# --------------------------------------------------------------------------
semantic_checks:

  five_layer_compliance:
    description: >
      所有模块必须放在 framework.config.json 中声明的合法 outer layer 里，
      且依赖方向遵循 architecture.outer_layers[].can_depend_on 矩阵；
      同层内依赖按 intra_layer_deps 模式（forbid / dag / sublayer）裁决。
      具体层名与方向由实例工程声明；framework 只守"DAG、无自指、引用已声明层"
      等元规则。
    severity: BLOCKER
    ai_prompt_hint: >
      审查模块架构图和依赖关系：(1) 每个模块是否在 outer_layers 声明的合法层里；
      (2) 依赖箭头是否满足 can_depend_on 矩阵（自上而下或实例工程显式允许的方向）；
      (3) 同层依赖是否符合 intra_layer_deps 的模式要求。

  module_internal_layer_compliance:
    description: >
      每个模块的文件路径必须落在 framework.config.json 中
      architecture.module_inner_layers 声明的内层之一；依赖方向按 upward
      规则（索引大的层可依赖索引小的层）。参考实例默认
      shared / data / domain / presentation 四层，其他实例可自行声明。
    severity: BLOCKER
    ai_prompt_hint: >
      逐个文件检查路径是否落在实例工程声明的内层之一；
      参考实例的典型分布（以 shared/data/domain/presentation 四层为例）：
      常量→shared，模型→data/model，仓库→data/repository，
      服务→domain/service，页面→presentation/pages，组件→presentation/components；
      其他实例以 module_inner_layers 声明为准。

  module_minimality:
    description: >
      仅创建 spec 功能实际需要的模块，不允许预创建无明确需求的模块
    severity: MAJOR
    ai_prompt_hint: >
      检查每个新增模块是否有 spec 中的功能点直接驱动，
      没有被 spec 功能引用的模块应被质疑

  feature_split_accuracy:
    description: >
      功能拆分到模块的决策是否合理：
      账号相关 → AccountManager，通用 UI → CommUI，
      工具能力 → CommFunc，页面 UI → Feature 层对应模块
    severity: MAJOR
    ai_prompt_hint: >
      逐条审查功能拆分表，判断每个功能点是否分配到了职责最匹配的模块

  data_type_legality:
    description: >
      数据模型字段类型必须是 ArkTS 合法类型
      （string、number、boolean、Resource、Array、枚举等），
      不允许使用 any 或未定义的自造类型
    severity: BLOCKER
    ai_prompt_hint: >
      审查所有数据模型定义中的字段类型，确认都是 ArkTS 合法类型

  no_tbd_in_p0_p1:
    description: >
      P0/P1 范围内不允许存在"待定"、"TBD"、"TODO"等未决标记
    severity: BLOCKER
    ai_prompt_hint: >
      搜索文档中所有 P0/P1 相关内容，检查是否存在 TBD/待定/TODO 标记

  architecture_doc_consistency:
    description: >
      plan.md 中涉及的分层归属、跨模块依赖边、出口约定（cross_module_exports_file，如 index.ets）
      必须与 doc/architecture.md 声明的外层 / 内层 / cross_module_exports_file 一致；
      模块清单的行级一致性由 doc/module-catalog.yaml 承担，本规则不再校验。
      若分层归属 / 依赖边 / 出口约定存在不一致且未在文档中说明差异原因，判为 FAIL。
    severity: MAJOR
    ai_prompt_hint: >
      对比 plan.md 和 architecture.md 的「分层归属（外层 id）」、
      「跨模块依赖边」、「出口约定（导出文件名与 config 一致）」，标出不一致之处；
      **不要**比对业务模块清单的行级细节。

  navigation_flow_consistency:
    description: >
      路由/导航设计中的页面跳转关系必须与 spec 中的业务流程图一致
    severity: MAJOR
    ai_prompt_hint: >
      对比 plan.md 的路由设计和 spec 的业务流程图，
      每条跳转路径是否都有对应

# --------------------------------------------------------------------------
# 追溯约束 — 脚本 + AI 联合检查
# --------------------------------------------------------------------------
traceability_checks:

  spec_p0_coverage:
    description: >
      spec 中每个 P0 功能点必须在「spec 功能映射表」中有至少一行映射
    severity: BLOCKER
    rule:
      source: "spec.md > 功能清单"
      filter: 'priority == "P0"'
      target: "plan.md > spec 功能映射表"
      link_field: "spec 编号"
      coverage: "100%"

  spec_p1_coverage:
    description: >
      spec 中每个 P1 功能点必须在映射表中有至少一行映射
    severity: BLOCKER
    rule:
      source: "spec.md > 功能清单"
      filter: 'priority == "P1"'
      target: "plan.md > spec 功能映射表"
      link_field: "spec 编号"
      coverage: "100%"

  mapping_to_file:
    description: >
      映射表中每行的「关键文件」必须能在「目录/文件结构规划」中找到
    severity: BLOCKER
    rule:
      source: "spec 功能映射表.关键文件"
      target: "目录/文件结构规划"
      match: "file_path_exists"

  acceptance_to_interface:
    description: >
      spec 的验收标准中涉及数据展示/操作的 AC 项，
      应能在plan 文档的数据模型或接口定义中找到支撑
    severity: MAJOR
    ai_prompt_hint: >
      对每条 spec 验收标准，判断 plan.md 中是否有对应的数据模型、
      接口方法或组件来支撑该验收标准的实现

  plan_to_architecture:
    description: >
      仅当 plan.md 声明 architecture_impact.impact != 'none' 时触发：
      plan.md 在「架构影响声明」中声明的 architecture_md_updates
      必须已在 doc/architecture.md 中落盘。
      feature 级变更（impact == 'none'）不触发本规则，check 返回 SKIP，
      架构文档无需同步（对应 plan Step 12 的重写条款）。
    severity: MAJOR
    rule:
      precondition: "plan.md > 架构影响声明 > impact != 'none'"
      source: "plan.md > 架构影响声明 > architecture_md_updates"
      target: "doc/architecture.md"
      expect: "all_declared_updates_applied"
