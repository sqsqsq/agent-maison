# Profile-local Skill 资产清单（机器可读）
# -----------------------------------------------------------------------------
# 供根目录 framework/skills/**/SKILL.md 通过 `profile-skill-asset:<skill>/<key>` 动态解析。
# 除下列「repo 根相对」键外，路径均相对 `framework/profiles/<profile>/skills/<skill>/`。
# schema_version: "1.0"
# -----------------------------------------------------------------------------

schema_version: "1.0"
profile: hmos-app

assets:
