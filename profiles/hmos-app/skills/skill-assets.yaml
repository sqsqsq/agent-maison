    # 兼容别名
    examples_wallet_domain: examples-domain-mapping.md
    module_card_template: templates/module-card-template.yaml
    glossary_term_template: templates/glossary-term-template.yaml

  1-prd-design:
    prd_template: templates/prd-template.md
    example_prd: examples/example-prd.md
    examples_prd_mapping: examples-prd-mapping.md

  2-requirement-design:
    design_template: templates/design-template.md
    api_spec_template: templates/api-spec.md
    data_model_template: templates/data-model.md
    example_design: examples/example-design.md

  3-coding:
    coding_standards: templates/coding-standards.md
    module_scaffold: templates/module-scaffold.md
    arkts_pitfalls: reference/arkts-pitfalls.md
    arkui_patterns: reference/arkui-patterns.md
