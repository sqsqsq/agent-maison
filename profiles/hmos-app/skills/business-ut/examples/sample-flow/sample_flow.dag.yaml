# ============================================================================
# 示例 DAG：task_submission 流程（v2.1）
# 实际路径示意：02-Feature/TaskDemo/test/dag/sample_flow.dag.yaml
# ============================================================================
flow_id: task_submission
flow_name: 多步任务提交流程（中性示例）
module: task-demo
version: "1.0"

use_case: task_submission
branches:
  - happy_path
  - validate_fail
  - apply_fail
  - persist_fail
  - otp_fail_rollback
  - user_cancel_in_waiting_otp

linked_acceptance: [AC-1, AC-2, AC-3, AC-4, AC-5, AC-6, AC-7]

entry_point:
  module: TaskDemo
  file: 02-Feature/TaskDemo/src/main/ets/domain/flow/TaskSubmitFlow.ets
  function: submitTask

nodes:
  - id: t1
    type: user_trigger
    description: 用户在 TaskFormPage 触发提交（UT 调用 flow.submitTask）
    source:
      file: 02-Feature/TaskDemo/src/main/ets/domain/flow/TaskSubmitFlow.ets
      function: submitTask
      class: TaskSubmitFlow
    trigger:
      event: submitTask
      simulated_value: "{ sku: 'SKU1', actorId: 'u1' }"
    next: [s1]

  - id: s1
    type: state_transition
    description: state.phase → Preparing
    transition:
      to_phase: Preparing
    next: [p1]

  - id: p1
    type: port_call_cloud
    description: 远程校验
    boundary: gateway
    source:
      file: 02-Feature/TaskDemo/src/main/ets/data/api/RemoteTaskGateway.ets
      function: validateRequest
      class: RemoteTaskGateway
    stub_strategy: mock_response
    mock_data:
      success: { description: 校验通过, value: "{ ok: true, token: 't' }" }
      error: { description: 校验拒绝, value: "{ ok: false, code: 'VAL_ERR' }" }
    next: [b1]

  - id: b1
    type: conditional_branch
    description: 校验分支
    condition: "gateResult.ok === true"
    branches:
      true_branch: [s2]
      false_branch: [a_validate_fail]

  - id: s2
    type: state_transition
    description: Applying
    transition: { to_phase: Applying }
    next: [p2]

  - id: p2
    type: port_call_cloud
    description: 配额申请
    boundary: gateway
    source:
      file: 02-Feature/TaskDemo/src/main/ets/data/api/RemoteTaskGateway.ets
      function: allocateResource
      class: RemoteTaskGateway
    stub_strategy: mock_response
    mock_data:
      success: { description: 返回任务 id, value: "{ taskId: 't1', owner: 'u1' }" }
      error: { description: 申请失败, value: "{ ok: false, code: 'APPLY_ERR' }" }
    next: [b2]

  - id: b2
    type: conditional_branch
    condition: "alloc.taskId != null"
    branches:
      true_branch: [s3]
      false_branch: [a_apply_fail]

  - id: s3
    type: state_transition
    transition: { to_phase: Persisting }
    next: [p3]

  - id: p3
    type: port_call_local
    description: 本地持久化
    boundary: ledger
    source:
      file: 02-Feature/TaskDemo/src/main/ets/data/storage/LocalTaskLedger.ets
      function: save
      class: LocalTaskLedger
    stub_strategy: mock_response
    mock_data:
      success: { description: OK, value: "undefined" }
      throw: { description: IO 异常, value: "throw new Error('disk-full')" }
    next: [b3]

  - id: b3
    type: conditional_branch
    branches:
      true_branch: [s4]
      false_branch: [a_persist_fail]

  - id: s4
    type: state_transition
    transition: { to_phase: WaitingOtp }
    next: [u_otp_watch, t2, t3]

  - id: u_otp_watch
    type: ui_subscription
    description: device-testing 覆盖 OtpSheetPage / TaskResultPage
    ui: [OtpSheetPage, TaskResultPage]
    state_key: state.phase
    next: []

  - id: t2
    type: user_trigger
    source:
      file: 02-Feature/TaskDemo/src/main/ets/domain/flow/TaskSubmitFlow.ets
      function: confirmOtp
      class: TaskSubmitFlow
    trigger:
      event: confirmOtp
      simulated_value: "'654321'"
    next: [s5]

  - id: t3
    type: user_trigger
    source:
      file: 02-Feature/TaskDemo/src/main/ets/domain/flow/TaskSubmitFlow.ets
      function: cancel
      class: TaskSubmitFlow
    trigger:
      event: cancel
    next: [a_user_cancel]

  - id: s5
    type: state_transition
    transition: { to_phase: Verifying }
    next: [p4]

  - id: p4
    type: port_call_cloud
    boundary: gateway
    source:
      file: 02-Feature/TaskDemo/src/main/ets/data/api/RemoteTaskGateway.ets
      function: verifyOtpCode
      class: RemoteTaskGateway
    stub_strategy: mock_response
    mock_data:
      success: { description: 通过, value: "{ ok: true }" }
      error: { description: 拒绝, value: "{ ok: false, code: 'OTP_ERR' }" }
    next: [b4]

  - id: b4
    type: conditional_branch
    condition: "otpResult.ok === true"
    branches:
      true_branch: [p5]
      false_branch: [p_otp_rollback]

  - id: p5
    type: port_call_local
    boundary: ledger
    source:
      file: 02-Feature/TaskDemo/src/main/ets/data/storage/LocalTaskLedger.ets
      function: update
      class: LocalTaskLedger
    stub_strategy: mock_response
    mock_data:
      success: { description: OK, value: "undefined" }
    next: [a_happy]

  - id: p_otp_rollback
    type: port_call_local
    boundary: ledger
    source:
      file: 02-Feature/TaskDemo/src/main/ets/data/storage/LocalTaskLedger.ets
      function: rollback
      class: LocalTaskLedger
    stub_strategy: mock_response
    mock_data:
      success: { description: OK, value: "undefined" }
    next: [a_otp_fail]

  - id: a_happy
    type: assertion
    linked_branch: happy_path
    linked_acceptance: [AC-1]
    assertions:
      - { type: state_check, target: state.phase, expected: "Success" }
      - { type: state_check, target: state.resultTaskId, expected: "'t1'" }
      - { type: data_check, target: gateway.callLog, expected: "['validateRequest','allocateResource','verifyOtpCode']" }
      - { type: data_check, target: ledger.callLog, expected: "['save','update']" }

  - id: a_validate_fail
    type: assertion
    linked_branch: validate_fail
    linked_acceptance: [AC-2]
    assertions:
      - { type: state_check, target: state.phase, expected: "Failed" }
      - { type: data_check, target: ledger.callLog, expected: "[]" }

  - id: a_apply_fail
    type: assertion
    linked_branch: apply_fail
    linked_acceptance: [AC-7]
    assertions:
      - { type: state_check, target: state.phase, expected: "Failed" }
      - { type: data_check, target: ledger.callLog, expected: "[]" }

  - id: a_persist_fail
    type: assertion
    linked_branch: persist_fail
    linked_acceptance: [AC-4]
    assertions:
      - { type: state_check, target: state.phase, expected: "Failed" }

  - id: a_otp_fail
    type: assertion
    linked_branch: otp_fail_rollback
    linked_acceptance: [AC-3]
    assertions:
      - { type: state_check, target: state.phase, expected: "Failed" }
      - { type: data_check, target: ledger.callLog, expected: "['save','rollback']" }

  - id: a_user_cancel
    type: assertion
    linked_branch: user_cancel_in_waiting_otp
    linked_acceptance: [AC-6]
    assertions:
      - { type: state_check, target: state.phase, expected: "Failed" }
      - { type: data_check, target: ledger.callLog, expected: "['save','rollback']" }
