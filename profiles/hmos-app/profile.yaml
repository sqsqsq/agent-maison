name: hmos-app
display_name: HarmonyOS 端侧应用（含元服务子型）

catalog_allowed_module_formats:
  - HAP
  - HAR
  - HSP
  - AtomicService

detect:
  signature_files:
    - oh-package.json5
    - build-profile.json5

phases_disabled: []

capabilities:
  coding.compile: { provider: hvigor, severity: BLOCKER }
  coding.deps_install: { provider: ohpm, severity: BLOCKER }
  coding.lint: { provider: arkts_lint, severity: BLOCKER }
  ut.compile: { provider: hvigor_ohostest, severity: BLOCKER }
  ut.run: { provider: hvigor_hypium, severity: BLOCKER }
  device_test.run: { provider: hylyre, severity: BLOCKER }
  device_test.build: { provider: hvigor_app, severity: BLOCKER }
  device_test.install: { provider: hdc_app, severity: BLOCKER }
  spec.visual_handoff: { provider: script, severity: BLOCKER }
  spec.ui_spec: { provider: script_ui_spec, severity: BLOCKER }
  spec.asset_acquisition: { provider: script_asset_acquisition, severity: MAJOR }
  plan.visual_parity: { provider: script_visual_parity_plan, severity: MAJOR }
  coding.visual_parity: { provider: script_visual_parity, severity: MAJOR }
  device_test.visual_diff: { provider: hylyre_visual_diff, severity: MAJOR }

personal_prerequisites:
  coding.compile: [deveco_toolchain]
  ut.compile: [deveco_toolchain]
  ut.run: [deveco_toolchain]
  device_test.build: [deveco_toolchain]
  device_test.install: [deveco_toolchain]
  device_test.run: [deveco_toolchain]

sub_variants:
  - name: element-service
    overrides_dir: sub-variants/element-service
