# ============================================================================
# 示例 DAG：card_opening 流程
# 实际位置：02-Feature/CardOpen/test/dag/card_opening.dag.yaml
# ----------------------------------------------------------------------------
# 一个 DAG 文件对应一个 UseCase 的完整业务流程，内部用 conditional_branch
# 描述所有可预期的分支（成功/各类失败）。UT 按 branches 数量生成同等数量的 it()。
# ============================================================================
flow_id: card_opening
flow_name: 银行卡开卡完整流程
module: card-opening
version: "1.0"

# 新增顶层字段：指向 use-cases.yaml 中的 UseCase 类和所覆盖的分支
use_case: CardOpeningUseCase
branches:
  - happy_path
  - validate_fail
  - apply_fail
  - persist_fail
  - sms_fail_rollback
  - user_cancel_in_waiting_sms

linked_acceptance: [AC-1, AC-2, AC-3, AC-4, AC-5, AC-6, AC-7]

entry_point:
  module: CardOpen
  file: 02-Feature/CardOpen/src/main/ets/domain/usecase/CardOpeningUseCase.ets
  function: startOpening

nodes:
  # ---------- 用户触发 ----------
  - id: t1
    type: user_trigger
    description: 用户在页面点击"开卡"按钮
    source:
      file: 02-Feature/CardOpen/src/main/ets/domain/usecase/CardOpeningUseCase.ets
      function: startOpening
      class: CardOpeningUseCase
    trigger:
      event: startOpening
      simulated_value: "{ bankCode: 'BOC', userId: 'u1' }"
    next: [s1]

  # ---------- 云侧校验 ----------
  - id: s1
    type: state_transition
    description: state.phase → Validating
    transition:
      to_phase: Validating
    next: [p1]

  - id: p1
    type: port_call_cloud
    description: 云侧校验开卡资格
    source:
      file: 02-Feature/CardOpen/src/main/ets/data/api/CardOpenApi.ets
      function: validateOpen
      class: CardOpenApi
    stub_strategy: mock_response
    mock_data:
      success:
        description: 校验通过，返回 token
        value: "{ ok: true, token: 't' }"
      error:
        description: 校验失败
        value: "{ ok: false, code: 'VAL_ERR' }"
      throw:
        description: 网络异常
        value: "throw new Error('network')"
    next: [b1]

  - id: b1
    type: conditional_branch
    description: 校验结果分支
    condition: "validateResult.ok === true"
    branches:
      true_branch: [s2]
      false_branch: [a_validate_fail]

  # ---------- 申请卡资源 ----------
  - id: s2
    type: state_transition
    description: state.phase → Applying
    transition:
      to_phase: Applying
    next: [p2]

  - id: p2
    type: port_call_cloud
    description: 云侧申请卡资源
    source:
      file: 02-Feature/CardOpen/src/main/ets/data/api/CardOpenApi.ets
      function: applyCardResource
      class: CardOpenApi
    stub_strategy: mock_response
    mock_data:
      success: { description: 返回 cardId,  value: "{ cardId: 'c1', holder: 'u1' }" }
      error:   { description: 申请失败,      value: "{ ok: false, code: 'APPLY_ERR' }" }
    next: [b2]

  - id: b2
    type: conditional_branch
    description: 申请结果分支
    condition: "resource.cardId != null"
    branches:
      true_branch: [s3]
      false_branch: [a_apply_fail]

  # ---------- 本地持久化 ----------
  - id: s3
    type: state_transition
    description: state.phase → Persisting
    transition: { to_phase: Persisting }
    next: [p3]

  - id: p3
    type: port_call_local
    description: 本地持久化卡记录
    source:
      file: 02-Feature/CardOpen/src/main/ets/data/storage/CardPersistence.ets
      function: save
      class: CardPersistence
    stub_strategy: mock_response
    mock_data:
      success: { description: 写入成功, value: "undefined" }
      throw:   { description: 写入抛异常, value: "throw new Error('disk-full')" }
    next: [b3]

  - id: b3
    type: conditional_branch
    description: 持久化结果分支
    condition: "storage.save succeeded"
    branches:
      true_branch: [s4]
      false_branch: [a_persist_fail]

  # ---------- 等待短验 ----------
  - id: s4
    type: state_transition
    description: state.phase → WaitingSms；等待用户短验输入 or 取消
    transition: { to_phase: WaitingSms }
    next: [t2, t3]

  - id: t2
    type: user_trigger
    description: 用户输入短验并提交
    source:
      file: 02-Feature/CardOpen/src/main/ets/domain/usecase/CardOpeningUseCase.ets
      function: submitSmsCode
      class: CardOpeningUseCase
    trigger:
      event: submitSmsCode
      simulated_value: "'123456'"
    next: [s5]

  - id: t3
    type: user_trigger
    description: 用户取消流程
    source:
      file: 02-Feature/CardOpen/src/main/ets/domain/usecase/CardOpeningUseCase.ets
      function: cancel
      class: CardOpeningUseCase
    trigger:
      event: cancel
    next: [a_user_cancel]

  # ---------- 短验 ----------
  - id: s5
    type: state_transition
    description: state.phase → Verifying
    transition: { to_phase: Verifying }
    next: [p4]

  - id: p4
    type: port_call_cloud
    description: 云侧校验短验
    source:
      file: 02-Feature/CardOpen/src/main/ets/data/api/CardOpenApi.ets
      function: verifySmsCode
      class: CardOpenApi
    stub_strategy: mock_response
    mock_data:
      success: { description: 短验通过, value: "{ ok: true }" }
      error:   { description: 短验失败, value: "{ ok: false, code: 'SMS_ERR' }" }
    next: [b4]

  - id: b4
    type: conditional_branch
    description: 短验结果分支
    condition: "verifyResult.ok === true"
    branches:
      true_branch: [p5]
      false_branch: [p_sms_rollback]

  - id: p5
    type: port_call_local
    description: 激活持久化卡记录
    source:
      file: 02-Feature/CardOpen/src/main/ets/data/storage/CardPersistence.ets
      function: update
      class: CardPersistence
    stub_strategy: mock_response
    mock_data:
      success: { description: 激活成功, value: "undefined" }
    next: [a_happy]

  - id: p_sms_rollback
    type: port_call_local
    description: 短验失败，回滚已写入的卡
    source:
      file: 02-Feature/CardOpen/src/main/ets/data/storage/CardPersistence.ets
      function: rollback
      class: CardPersistence
    stub_strategy: mock_response
    mock_data:
      success: { description: 回滚成功, value: "undefined" }
    next: [a_sms_fail]

  # ==========================================================================
  # 断言节点（每个对应 use-cases.yaml 中的一个 branch）
  # ==========================================================================
  - id: a_happy
    type: assertion
    description: 开卡全链路成功
    linked_branch: happy_path
    linked_acceptance: [AC-1]
    assertions:
      - { type: state_check, target: state.phase,        expected: "Success" }
      - { type: state_check, target: state.resultCardId, expected: "'c1'" }
      - { type: data_check,  target: api.callLog,        expected: "['validateOpen','applyCardResource','verifySmsCode']" }
      - { type: data_check,  target: storage.callLog,    expected: "['save','update']" }

  - id: a_validate_fail
    type: assertion
    description: 云侧校验失败，无本地写入
    linked_branch: validate_fail
    linked_acceptance: [AC-2]
    assertions:
      - { type: state_check, target: state.phase,     expected: "Failed" }
      - { type: state_check, target: state.errorCode, expected: "'VAL_ERR'" }
      - { type: data_check,  target: storage.callLog, expected: "[]" }

  - id: a_apply_fail
    type: assertion
    description: 云侧申请失败，无本地写入
    linked_branch: apply_fail
    linked_acceptance: [AC-7]
    assertions:
      - { type: state_check, target: state.phase,     expected: "Failed" }
      - { type: state_check, target: state.errorCode, expected: "'APPLY_ERR'" }
      - { type: data_check,  target: storage.callLog, expected: "[]" }

  - id: a_persist_fail
    type: assertion
    description: 本地持久化失败，不进入短验
    linked_branch: persist_fail
    linked_acceptance: [AC-4]
    assertions:
      - { type: state_check, target: state.phase,     expected: "Failed" }
      - { type: state_check, target: state.errorCode, expected: "'PERSIST_ERR'" }
      - { type: data_check,  target: api.callLog,     expected: "['validateOpen','applyCardResource']" }

  - id: a_sms_fail
    type: assertion
    description: 短验失败，回滚已持久化卡
    linked_branch: sms_fail_rollback
    linked_acceptance: [AC-3]
    assertions:
      - { type: state_check, target: state.phase,     expected: "Failed" }
      - { type: state_check, target: state.errorCode, expected: "'SMS_ERR'" }
      - { type: data_check,  target: storage.callLog, expected: "['save','rollback']" }

  - id: a_user_cancel
    type: assertion
    description: 用户取消，已持久化卡回滚
    linked_branch: user_cancel_in_waiting_sms
    linked_acceptance: [AC-6]
    assertions:
      - { type: state_check, target: state.phase,     expected: "Failed" }
      - { type: state_check, target: state.errorCode, expected: "'USER_CANCELLED'" }
      - { type: data_check,  target: storage.callLog, expected: "['save','rollback']" }
