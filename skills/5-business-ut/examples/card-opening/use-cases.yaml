# ============================================================================
# 示例：银行卡开卡流程 Use Case 规约（v2.1）
# 位置：doc/features/card-opening/use-cases.yaml
# ============================================================================
# 说明：
#   本文件是一份**业务规约**，而不是"必须产生的代码"。它回答三件事：
#     1) 流程的"命名业务入口"是哪些（UT 可直接调用）
#     2) 流程的"数据边界"是哪些（UT 在这里打桩）
#     3) 流程的"状态机 + 分支"长什么样（UT 的 it() 逐条对齐）
#   代码形态（Page 命名方法 / 普通 Flow/Coordinator 类 / 导出函数）由 Skill 3 自选。
#   本样例里选了"普通 ArkTS 类 CardOpenFlow"，放在 domain/flow/ 下。
#
# 业务流程（PRD.md）：
#   1. 用户在 CardSelectPage 选择银行信息并点击开卡（UI 真人输入，在 UT 中直接调用 flow.chooseCard）
#   2. CardOpenFlow 调云侧 validateOpen 校验开卡资格
#   3. 校验通过后调云侧 applyCardResource 申请卡资源
#   4. 收到卡资源后调本地 store.save 持久化卡记录，并切到 WaitingSms
#   5. 用户在 SmsDialog 输入短信验证码（UI 真人输入，在 UT 中直接调用 flow.confirmSms）
#   6. CardOpenFlow 调云侧 verifySmsCode 校验短验
#   7. 成功则 store.update 标记激活态、进入 Success；失败则 store.rollback
# ============================================================================
schema_version: "2.1"
feature: "card-opening"

use_cases:
  - id: "card_opening"
    description: "银行卡开卡完整流程：云侧校验 → 申请卡资源 → 本地持久化 → 短验 → 最终激活/回滚"

    # ========================================================================
    # 业务编排入口（命名符号；代码形态由 Skill 3 自选）
    # ========================================================================
    coordinator: "CardOpenFlow"
    coordinator_file: "02-Feature/CardOpen/src/main/ets/domain/flow/CardOpenFlow.ets"

    # ========================================================================
    # UI ↔ 业务入口映射（UT 按此直接调用命名方法，不 new struct）
    # ========================================================================
    ui_bindings:
      - ui: "CardSelectPage"
        role: "entry"
        subscribes: []
        user_actions:
          - trigger: "用户选完银行信息点击开卡"
            calls: "flow.chooseCard"         # 对应 CardOpenFlow.chooseCard(bankInfo)
      - ui: "CardOpenProgressPage"
        role: "progress"
        subscribes:
          - "flow.state.phase"
        user_actions: []                     # 纯展示，无用户动作
      - ui: "SmsDialog"
        role: "dialog"
        subscribes:
          - "flow.state.phase=WaitingSms"
        user_actions:
          - trigger: "用户在短验弹框点击确认"
            calls: "flow.confirmSms"         # 对应 CardOpenFlow.confirmSms(smsCode)
          - trigger: "用户点击取消"
            calls: "flow.cancel"             # 对应 CardOpenFlow.cancel()
      - ui: "CardOpenResultPage"
        role: "result"
        subscribes:
          - "flow.state.phase=Success"
          - "flow.state.phase=Failed"
          - "flow.state.errorCode"
        user_actions: []                     # 结果页只做展示，UT 不涉及

    # ========================================================================
    # 数据边界（引用 contracts.yaml > interfaces[].class，非新造 Port）
    # ========================================================================
    data_boundaries:
      - name: "api"
        type: "CardOpenApi"                  # 既有 data 层类
        kind: "cloud"
        methods:
          - { name: "validateOpen",      params: ["BankInfo"],         returns: "ValidateResult", async: true }
          - { name: "applyCardResource", params: ["ValidateResult"],   returns: "CardResource",   async: true }
          - { name: "verifySmsCode",     params: ["string", "string"], returns: "VerifyResult",   async: true }
      - name: "store"
        type: "CardStore"                    # 既有本地存储类
        kind: "storage"
        methods:
          - { name: "save",     params: ["CardInfo"], returns: "void", async: true }
          - { name: "update",   params: ["CardInfo"], returns: "void", async: true }
          - { name: "rollback", params: ["string"],   returns: "void", async: true }

    # ========================================================================
    # 状态机
    # ========================================================================
    state_model:
      phases: [Idle, Validating, Applying, Persisting, WaitingSms, Verifying, Success, Failed]
      fields:
        - { name: "errorCode",    type: "string | null" }
        - { name: "resultCardId", type: "string | null" }

    # ========================================================================
    # 分支清单：UT 按此 1:1 产出 it()
    # ========================================================================
    branches:
      # ---------------------------------------------------------------------
      # 成功路径：对应 AC-1（开卡全流程）
      # ---------------------------------------------------------------------
      - id: "happy_path"
        scenario: "开卡全链路成功：校验通过 → 申请卡资源 → 本地持久化 → 短验通过 → 激活"
        setup:
          "api.validateOpen":      "ok"
          "api.applyCardResource": "ok"
          "api.verifySmsCode":     "ok"
          "store.save":            "ok"
          "store.update":          "ok"
        triggers:
          - { call: "flow.chooseCard", with: { bankCode: "BOC", userId: "u1" } }
          - { call: "flow.confirmSms", with: { smsCode: "123456" } }
        expected_phase_sequence: [Idle, Validating, Applying, Persisting, WaitingSms, Verifying, Success]
        expected_boundary_calls:
          - "api.validateOpen"
          - "api.applyCardResource"
          - "store.save"
          - "api.verifySmsCode"
          - "store.update"
        expected_state:
          errorCode: "null"
          resultCardId: "c1"
        linked_acceptance: ["AC-1"]

      # ---------------------------------------------------------------------
      # 云侧校验失败：不触发 applyCardResource / store.save
      # ---------------------------------------------------------------------
      - id: "validate_fail"
        scenario: "云侧开卡校验失败（如资格不符），流程在第 2 步终止，不写入任何本地数据"
        setup:
          "api.validateOpen": "fail:VAL_ERR"
        triggers:
          - { call: "flow.chooseCard", with: { bankCode: "BOC", userId: "u1" } }
        expected_phase_sequence: [Idle, Validating, Failed]
        expected_boundary_calls: ["api.validateOpen"]
        expected_state:
          errorCode: "VAL_ERR"
          resultCardId: "null"
        not_called:
          - "api.applyCardResource"
          - "store.save"
          - "api.verifySmsCode"
        linked_acceptance: ["AC-2"]

      # ---------------------------------------------------------------------
      # 申请卡资源失败：已校验通过，但云侧失败，不写本地
      # ---------------------------------------------------------------------
      - id: "apply_fail"
        scenario: "云侧申请卡资源失败，不触发本地持久化与短验"
        setup:
          "api.validateOpen":      "ok"
          "api.applyCardResource": "fail:APPLY_ERR"
        triggers:
          - { call: "flow.chooseCard", with: { bankCode: "BOC", userId: "u1" } }
        expected_phase_sequence: [Idle, Validating, Applying, Failed]
        expected_boundary_calls: ["api.validateOpen", "api.applyCardResource"]
        expected_state:
          errorCode: "APPLY_ERR"
        not_called:
          - "store.save"
          - "api.verifySmsCode"
        linked_acceptance: ["AC-7"]

      # ---------------------------------------------------------------------
      # 本地持久化失败：流程终止于 Persisting，不进入短验
      # ---------------------------------------------------------------------
      - id: "persist_fail"
        scenario: "本地持久化写入异常，流程在第 4 步终止，不进入短验"
        setup:
          "api.validateOpen":      "ok"
          "api.applyCardResource": "ok"
          "store.save":            "throw"
        triggers:
          - { call: "flow.chooseCard", with: { bankCode: "BOC", userId: "u1" } }
        expected_phase_sequence: [Idle, Validating, Applying, Persisting, Failed]
        expected_boundary_calls: ["api.validateOpen", "api.applyCardResource", "store.save"]
        expected_state:
          errorCode: "PERSIST_ERR"
        not_called:
          - "api.verifySmsCode"
          - "store.update"
        linked_acceptance: ["AC-4"]

      # ---------------------------------------------------------------------
      # 短验失败回滚：已持久化的卡必须被回滚
      # ---------------------------------------------------------------------
      - id: "sms_fail_rollback"
        scenario: "短验失败，必须回滚已写入本地的卡记录"
        setup:
          "api.validateOpen":      "ok"
          "api.applyCardResource": "ok"
          "store.save":            "ok"
          "api.verifySmsCode":     "fail:SMS_ERR"
          "store.rollback":        "ok"
        triggers:
          - { call: "flow.chooseCard", with: { bankCode: "BOC", userId: "u1" } }
          - { call: "flow.confirmSms", with: { smsCode: "999999" } }
        expected_phase_sequence: [Idle, Validating, Applying, Persisting, WaitingSms, Verifying, Failed]
        expected_boundary_calls:
          - "api.validateOpen"
          - "api.applyCardResource"
          - "store.save"
          - "api.verifySmsCode"
          - "store.rollback"
        expected_state:
          errorCode: "SMS_ERR"
        not_called: ["store.update"]
        linked_acceptance: ["AC-3"]

      # ---------------------------------------------------------------------
      # 用户取消：在 WaitingSms 态主动退出
      # ---------------------------------------------------------------------
      - id: "user_cancel_in_waiting_sms"
        scenario: "用户在等待短验阶段取消，已持久化的卡应回滚"
        setup:
          "api.validateOpen":      "ok"
          "api.applyCardResource": "ok"
          "store.save":            "ok"
          "store.rollback":        "ok"
        triggers:
          - { call: "flow.chooseCard", with: { bankCode: "BOC", userId: "u1" } }
          - { call: "flow.cancel",     with: {} }
        expected_phase_sequence: [Idle, Validating, Applying, Persisting, WaitingSms, Failed]
        expected_boundary_calls:
          - "api.validateOpen"
          - "api.applyCardResource"
          - "store.save"
          - "store.rollback"
        expected_state:
          errorCode: "USER_CANCELLED"
        not_called:
          - "api.verifySmsCode"
          - "store.update"
        linked_acceptance: ["AC-6"]
