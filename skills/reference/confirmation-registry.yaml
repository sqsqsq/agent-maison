        label: "冻结 PRD — 可进入 Skill 2 技术设计"
        portable: "1=冻结 PRD，可进 Skill 2"
      - value: continue_edit
        label: "继续改 PRD — 本轮不冻结"
        portable: "2=继续改 PRD"

  # --- Skill 2 design ---
  - id: design.scope_expansion
