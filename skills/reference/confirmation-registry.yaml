# Confirmation registry — machine-readable index for user-confirmation-ux.md
# Lint: check-skills-confirmation-ux.ts validates SKILL.md references and options schema.
schema_version: "2.0"

entries:
  # --- framework-init init ---
  - id: init.materialized_adapters
    skill: "framework-init"
    class: artifact_checkbox
    ssot_anchor: "user-confirmation-ux.md §3.4"
    skill_step: "S2 计划批准"
    portable_menu: "多选 adapter 目录名（claude/cursor/generic）；须至少 1 项"
    notes: "项目级物化清单；写入 framework.config.json materialized_adapters[]。generic 默认物化到 .agents/bridge，无需额外配置；仅非标 bundle 根须手动编辑 framework.config.json 后重跑"
    options:
      - value: claude
        label: "claude — 物化 Claude Code 入口与 .claude/ 产物"
        portable: "claude"
      - value: cursor
        label: "cursor — 物化 Cursor AGENTS.md 与 .cursor/ 产物"
        portable: "cursor"
      - value: generic
        label: "generic — 物化 generic bundle 入口与 skills"
        portable: "generic"

  - id: init.task_plan
    skill: "framework-init"
    class: gate
    ssot_anchor: "user-confirmation-ux.md §3.1"
    skill_step: "S2 计划批准"
    portable_menu: "1=智能模式按默认动作 2=手动模式逐项 3=全部跳过可跳过项"
    notes: "决策 JSON 须通过 init-orchestrate validateDecisionJson；不可跳过非 skippable 任务"
    options:
      - value: smart_run
        label: "智能模式 — 按任务默认动作执行；机制项自动同步，doc drift 默认保留，一次性批准"
        portable: "1=智能模式"
      - value: manual_review
        label: "手动模式 — 漂移任务逐项 init.task_decision（覆盖/保留）"
        portable: "2=手动模式"
      - value: skip_skippable
        label: "跳过可跳过项 — 仅执行不可跳过任务（依赖闭包校验）"
        portable: "3=跳过可跳过项"

  - id: init.task_decision
    skill: "framework-init"
    class: enum
    ssot_anchor: "user-confirmation-ux.md §3.2"
    skill_step: "S2 手动模式 / S3 执行"
    parent: init.task_plan
    portable_menu: "1=覆盖 2=保留"
    notes: "纯枚举；禁止 Q1=y 自由文本逐项"
    options:
      - value: overwrite
        label: "覆盖 — 按 harness 任务执行写入/同步"
        portable: "1=覆盖"
      - value: keep
        label: "保留 — 保持磁盘当前内容，跳过本任务"
        portable: "2=保留"

  - id: setup.adapter
    skill: "_personal_setup"
    class: enum
    ssot_anchor: "user-confirmation-ux.md §3.2"
    skill_step: "S1 选 adapter"
    portable_menu: "从 materialized_adapters 已物化列表编号选择"
    notes: "仅可选项目已物化 adapter；未物化须引导 framework-init"
    options:
      - value: from_materialized
        label: "从已物化列表选择 — 编号对应 materialized_adapters 条目"
        portable: "1=从已物化列表选"

  - id: setup.deveco_path
    skill: "_personal_setup"
    class: enum
    ssot_anchor: "user-confirmation-ux.md §3.2"
    skill_step: "S2 记录路径"
    portable_menu: "1=采用探测路径 2=跳过"
    notes: "写入 framework.local.json；禁止对话收自由路径字符串"
    options:
      - value: detected
        label: "采用探测路径 — 使用 detect-deveco 候选列表中的路径"
        portable: "1=采用探测路径"
      - value: skip
        label: "跳过 — 本轮不写入 DevEco 安装路径"
        portable: "2=跳过"

  - id: init.project_profile
    skill: "framework-init"
    class: enum
    ssot_anchor: "user-confirmation-ux.md §3.2"
    skill_step: "S2 项目元数据"
    portable_menu: "1=generic 2=hmos-app"
    notes: "仅从已发布 profile 编号选择；禁止对话收自定义 name 字符串"
    options:
      - value: generic
        label: "generic — 通用宿主 profile"
        portable: "1=generic"
      - value: hmos-app
        label: "hmos-app — HarmonyOS 应用 profile"
        portable: "2=hmos-app"

  - id: init.architecture_preset
    skill: "framework-init"
    class: enum
    ssot_anchor: "user-confirmation-ux.md §3.2"
    skill_step: "S2 架构 preset"
    portable_menu: "1=preset_5 2=preset_3 3=keep 4=manual_stop"
    notes: "禁止对话收集 architecture DSL；manual_edit_stop 须 STOP 写盘并指引编辑 framework.config.json"
    options:
      - value: preset_5_layer
        label: "选项 A — 5 外层 + 子层 preset"
        portable: "1=preset_5_layer"
      - value: preset_minimal_3
        label: "选项 B — 极简三外层"
        portable: "2=preset_minimal_3"
      - value: keep_existing
        label: "选项 C — 沿用磁盘已有 architecture"
        portable: "3=keep_existing"
      - value: manual_edit_stop
        label: "选项 D — STOP，手动编辑 config 后重跑"
        portable: "4=manual_edit_stop"

  - id: init.intra_layer_deps
    skill: "framework-init"
    class: gate
    ssot_anchor: "user-confirmation-ux.md §3.1"
    skill_step: "Step 3.x"
    portable_menu: "1=全部按默认 2=调整某层 3=讨论语义"
    batch_shorthand: ["全部按默认", "all=default", "1"]
    options:
      - value: all_default
        label: "全部维持「当前值」列所示策略（等价于每层「按默认」）"
        portable: "1=全部按默认"
      - value: adjust_layers
        label: "我要调整某几层（进入 matrix 子菜单）"
        portable: "2=调整某层"
      - value: discuss
        label: "先讨论 forbid / dag / sublayer 语义"
        portable: "3=讨论语义"

  - id: init.intra_layer_deps.matrix
    skill: "framework-init"
    class: matrix
    ssot_anchor: "user-confirmation-ux.md §3.3"
    skill_step: "Step 3.x.1"
    parent: init.intra_layer_deps
    matrix_options:
      - value: default
        label: "按默认（当前值）"
        portable: "1=按默认"
      - value: dag
        label: "dag"
        portable: "2=dag"
      - value: forbid
        label: "forbid"
        portable: "3=forbid"
      - value: sublayer
        label: "sublayer（须 preset/磁盘已含 sublayers[]）"
        portable: "4=sublayer"

  - id: init.create_downgrade
    skill: "framework-init"
    class: enum
    ssot_anchor: "user-confirmation-ux.md §3.2"
    skill_step: "CREATE→UPDATE 降级"
    portable_menu: "1=继续 UPDATE 2=保持 CREATE"
    options:
      - value: continue_update
        label: "继续 UPDATE — 已有 config，走升级模式"
        portable: "1=继续 UPDATE"
      - value: keep_create
        label: "保持 CREATE — 仍按首次落地处理"
        portable: "2=保持 CREATE"

  # --- catalog-bootstrap catalog ---
  - id: catalog.staging_module
    skill: "catalog-bootstrap"
    class: enum
    ssot_anchor: "user-confirmation-ux.md §3.2"
    skill_step: "Phase A Step 5"
    portable_menu: "1=y确认 2=e修改 3=s跳过 4=q作废"
    options:
      - value: confirm
        label: "确认 — 按当前 staging 汇总写入 catalog / glossary"
        portable: "1=y确认"
      - value: edit
        label: "修改 — 我要调整 staging 内容后再确认"
        portable: "2=e修改"
      - value: skip
        label: "跳过 — 本模块/词条本轮不写入"
        portable: "3=s跳过"
      - value: void
        label: "作废 — 放弃本轮 staging"
        portable: "4=q作废"

  - id: catalog.staging_glossary
    skill: "catalog-bootstrap"
    class: enum
    ssot_anchor: "user-confirmation-ux.md §3.2"
    skill_step: "Phase B Step 3"
    portable_menu: "1=y确认 2=e修改 3=s跳过 4=q作废"
    options:
      - value: confirm
        label: "确认 — 按当前 staging 汇总写入 catalog / glossary"
        portable: "1=y确认"
      - value: edit
        label: "修改 — 我要调整 staging 内容后再确认"
        portable: "2=e修改"
      - value: skip
        label: "跳过 — 本模块/词条本轮不写入"
        portable: "3=s跳过"
      - value: void
        label: "作废 — 放弃本轮 staging"
        portable: "4=q作废"

  - id: code-graph.derive_confirm
    skill: "code-graph"
    class: gate
    ssot_anchor: "user-confirmation-ux.md §3.1"
    skill_step: "Step 2 bootstrap"
    portable_menu: "1=确认写盘 2=仅预览dry-run 3=取消"
    options:
      - value: write
        label: "确认 — 按 bootstrap 摘要写入/刷新 code-graph.yaml 的 derived"
        portable: "1=确认写盘"
      - value: dry_run_only
        label: "仅预览 — 保持 dry-run，本轮不写盘"
        portable: "2=仅预览"
      - value: cancel
        label: "取消 — 放弃本轮派生层刷新"
        portable: "3=取消"

  - id: code-graph.curated_confirm
    skill: "code-graph"
    class: gate
    ssot_anchor: "user-confirmation-ux.md §3.1"
    skill_step: "Step 3 策展"
    portable_menu: "1=确认nodes 2=继续修改 3=取消"
    options:
      - value: confirm_nodes
        label: "确认 — 按展示的 core/intent 写入 nodes 策展层"
        portable: "1=确认nodes"
      - value: edit
        label: "继续修改 — 调整 core 节点后再确认"
        portable: "2=继续修改"
      - value: cancel
        label: "取消 — 不写入策展层"
        portable: "3=取消"

  - id: catalog.seed_tech_word
    skill: "catalog-bootstrap"
    class: enum
    ssot_anchor: "user-confirmation-ux.md §3.2"
    skill_step: "glossary 种子守门"
    portable_menu: "1=删词 2=改自然语言 3=allowlist"
    options:
      - value: delete
        label: "删词 — 从种子清单移除该词"
        portable: "1=删词"
      - value: rephrase
        label: "改自然语言 — 修改词条表述"
        portable: "2=改自然语言"
      - value: allowlist
        label: "allowlist — 保留为技术词并登记"
        portable: "3=allowlist"

  # --- spec ---
  - id: spec.feature_path
    skill: "spec"
    class: enum
    ssot_anchor: "user-confirmation-ux.md §3.2"
    skill_step: "前置路径检查"
    portable_menu: "1=换 feature 名 2=清理/恢复路径"
    options:
      - value: rename_feature
        label: "换 feature 名 — 使用新的 feature 目录名"
        portable: "1=换 feature 名"
      - value: fix_path
        label: "清理或恢复路径 — 修复 doc/features 下冲突路径"
        portable: "2=清理/恢复路径"

  - id: spec.terminology
    skill: "spec"
    class: artifact_checkbox
    ssot_anchor: "user-confirmation-ux.md §3.4"
    skill_step: "Step 1.5"
    portable_menu: "1=全部确认high行 2=逐行确认 3=逐行修改"
    artifact: "spec.md ## 0. 术语映射表 [x]"
    harness: check-spec terminology_mapping_table
    options:
      - value: all_confirm
        label: "全部确认 — 所有行写回 spec [x]，进入后续 spec 步骤"
        portable: "1=全部确认 high 行"
        side_effect: "写回 spec 术语映射表 [x] 列"
      - value: row_by_row
        label: "逐行确认 — 逐条确认，有问题可修改"
        portable: "2=逐行确认"
      - value: row_edit
        label: "逐行修改映射 — 我要修改部分术语映射"
        portable: "3=逐行修改"
    matrix_options:
      - value: confirm_row
        label: "确认该行 — 写回本行 [x]"
        portable: "1=确认该行"
        side_effect: "写回 spec 术语映射表本行 [x]"
      - value: edit_row
        label: "改映射 — 修改本行权威模块或消歧"
        portable: "2=改映射"

  - id: spec.freeze
    skill: "spec"
    class: enum
    ssot_anchor: "user-confirmation-ux.md §3.2"
    skill_step: "Step 5 输出与归档"
    portable_menu: "1=冻结spec可进plan 2=继续改spec"
    options:
      - value: freeze
        label: "冻结 spec — 可进入 plan 阶段"
        portable: "1=冻结 spec，可进 plan"
      - value: continue_edit
        label: "继续改 spec — 本轮不冻结"
        portable: "2=继续改 spec"

  # --- plan ---
  - id: plan.scope_expansion
    skill: "plan"
    class: freeform_approval
    ssot_anchor: "user-confirmation-ux.md §3.5"
    skill_step: "Step 2.5"
    portable_menu: "1=已读并同意 2=拒绝 3=修改提议"
    requires_preamble: "须先展示完整 Scope 扩展提议正文"
    options:
      - value: approve
        label: "已读并同意扩展 — 记录用户原话到 expansions_with_user_approval"
        portable: "1=已读并同意"
        side_effect: "记录用户原话到 gap-notes expansions_with_user_approval"
      - value: reject
        label: "拒绝扩展 — 在原 in_scope 内重新设计"
        portable: "2=拒绝"
      - value: revise
        label: "修改提议后再议"
        portable: "3=修改提议"

  - id: plan.ok_to_code
    skill: "plan"
    class: enum
    ssot_anchor: "user-confirmation-ux.md §3.2"
    skill_step: "Step 13 / 产品闸门"
    portable_menu: "1=plan OK可编码 2=继续改plan"
    options:
      - value: ok
        label: "plan OK — 可进入 coding 编码"
        portable: "1=plan OK，可编码"
      - value: continue_design
        label: "继续改 plan — 本轮不授权编码"
        portable: "2=继续改 plan"

  - id: plan.arch_impact
    skill: "plan"
    class: enum
    ssot_anchor: "user-confirmation-ux.md §3.2"
    skill_step: "架构影响声明"
    portable_menu: "1=impact=none 2=dsl_change 3=其他(说明)"
    options:
      - value: none
        label: "impact=none — 无架构级变更"
        portable: "1=impact=none"
      - value: dsl_change
        label: "impact=dsl_change — 需更新 architecture DSL"
        portable: "2=dsl_change"
      - value: other
        label: "其他 — 我在对话中说明 impact 类型"
        portable: "3=其他(说明)"

  - id: plan.split_table
    skill: "plan"
    class: enum
    ssot_anchor: "user-confirmation-ux.md §3.2"
    skill_step: "功能拆分表"
    portable_menu: "1=确认拆分 2=修改拆分"
    options:
      - value: confirm_split
        label: "确认拆分 — 按当前拆分表继续设计"
        portable: "1=确认拆分"
      - value: edit_split
        label: "修改拆分 — 我要调整功能拆分"
        portable: "2=修改拆分"

  # --- coding coding ---
  - id: coding.scope_stop
    skill: "coding"
    class: enum
    ssot_anchor: "user-confirmation-ux.md §3.2"
    skill_step: "Scope 越界停步"
    portable_menu: "1=回plan走Scope扩展 2=收窄实现"
    options:
      - value: back_design
        label: "回 plan — 走 Scope 扩展提议"
        portable: "1=回 plan 走 Scope 扩展"
      - value: narrow
        label: "收窄实现 — 只在当前 in_scope 内完成"
        portable: "2=收窄实现"

  - id: coding.module_batch
    skill: "coding"
    class: enum
    ssot_anchor: "user-confirmation-ux.md §3.2"
    skill_step: "逐模块交付"
    portable_menu: "1=继续下一模块 2=修改本模块"
    options:
      - value: next_module
        label: "继续下一模块 — 本模块批次已确认"
        portable: "1=继续下一模块"
      - value: edit_module
        label: "修改本模块 — 我要调整当前模块实现"
        portable: "2=修改本模块"

  - id: coding.deps_abc
    skill: "coding"
    class: enum
    ssot_anchor: "user-confirmation-ux.md §3.2"
    skill_step: "依赖缺失 A/B/C"
    portable_menu: "1=确认安装重跑 2=只读清单 3=先确认源"
    options:
      - value: install_retry
        label: "确认安装并重跑 — 按清单安装依赖后重试 harness"
        portable: "1=确认安装重跑"
      - value: readonly_list
        label: "只读清单 — 仅展示依赖清单，暂不安装"
        portable: "2=只读清单"
      - value: confirm_source
        label: "先确认源 — 确认依赖来源/版本后再继续"
        portable: "3=先确认源"

  - id: coding.ok_to_review
    skill: "coding"
    class: enum
    ssot_anchor: "user-confirmation-ux.md §8"
    skill_step: "Step 7.3 闭环 / coding→review"
    portable_menu: "1=coding OK可进code-review 2=暂停 3=其它"
    options:
      - value: ok_review
        label: "coding OK — 可进入 code-review Code Review"
        portable: "1=coding OK，可进 code-review"
      - value: pause
        label: "暂停 — 暂不进入 Code Review"
        portable: "2=暂停"
      - value: other
        label: "其它 — 我在对话中说明意图"
        portable: "3=其它（说明）"

  - id: phase.next_step
    skill: "_cross_phase"
    class: enum
    ssot_anchor: "user-confirmation-ux.md §8.3"
    skill_step: "任一 feature phase 四件套 PASS 后"
    portable_menu: "1=进入下一plan=暂停 3=其它"
    options:
      - value: enter_next
        label: "进入下一 Skill — {next_skill_label}"
        portable: "1=进入下一 Skill"
        dynamic_label:
          placeholder: "{next_skill_label}"
          lookup: |
            spec → plan 技术设计
            plan → coding 编码
            coding → code-review Code Review
            review → business-ut 业务级 UT
            ut → device-testing 真机测试
            testing → 结束交付 / 归档
      - value: pause
        label: "暂停 — 本阶段到此，暂不进入下游"
        portable: "2=暂停"
      - value: other
        label: "其它 — 我在对话中说明意图"
        portable: "3=其它（说明）"

  # --- code-review review ---
  - id: review.module_name
    skill: "code-review"
    class: enum
    ssot_anchor: "user-confirmation-ux.md §3.2"
    skill_step: "Step 1"
    portable_menu: "1=确认模块名 2=修改模块名"
    options:
      - value: confirm
        label: "确认模块名 — 按当前模块名继续审查"
        portable: "1=确认"
      - value: edit
        label: "修改模块名 — 我要更正待审查模块"
        portable: "2=修改"

  - id: review.report_save
    skill: "code-review"
    class: enum
    ssot_anchor: "user-confirmation-ux.md §3.2"
    skill_step: "报告落盘前"
    portable_menu: "1=确认落盘 2=修改后再落盘"
    options:
      - value: save
        label: "确认落盘 — 将审查报告写入约定路径"
        portable: "1=确认落盘"
      - value: edit_first
        label: "修改后再落盘 — 我要先改报告内容"
        portable: "2=修改后再落盘"

  - id: review.ok_to_ut
    skill: "code-review"
    class: enum
    ssot_anchor: "user-confirmation-ux.md §8"
    skill_step: "Step 6.3 闭环 / review→UT"
    portable_menu: "1=review OK可进business-ut 2=暂停 3=其它"
    options:
      - value: ok_ut
        label: "review OK — 可进入 business-ut 业务级 UT"
        portable: "1=review OK，可进 business-ut"
      - value: pause
        label: "暂停 — 暂不进入 UT"
        portable: "2=暂停"
      - value: other
        label: "其它 — 我在对话中说明意图"
        portable: "3=其它（说明）"

  # --- business-ut UT ---
  - id: ut.plan_confirm
    skill: "business-ut"
    class: gate
    ssot_anchor: "user-confirmation-ux.md §3.1"
    skill_step: "Step 1 HARD STOP"
    portable_menu: "1=确认UT规划清单 2=调整清单"
