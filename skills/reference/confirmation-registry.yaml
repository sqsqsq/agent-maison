# Confirmation registry — machine-readable index for user-confirmation-ux.md
# Lint: check-skills-confirmation-ux.ts validates SKILL.md references and options schema.
schema_version: "2.0"

entries:
  # --- Skill 00 init ---
  - id: init.adapter
    skill: "00-framework-init"
    class: enum
    ssot_anchor: "user-confirmation-ux.md §3.2"
    skill_step: "§0.2.5 / §0.2.5.1"
    portable_menu: "1=claude 2=cursor 3=generic 4=保持当前"
    options:
      - value: claude
        label: "claude — Claude Code（CLAUDE.md + .claude/commands + .claude/agents + .claude/hooks；Skill 正文在 framework/skills/）"
        portable: "1=claude"
      - value: cursor
        label: "cursor — Cursor（AGENTS.md + .cursor/skills 跳板 + .cursor/rules）"
        portable: "2=cursor"
      - value: generic
        label: "generic — 通用（AGENTS.md + {agent_bundle_root}/skills inline 或 bridge）"
        portable: "3=generic"
      - value: keep_current
        label: "保持当前 — 沿用 framework.config.json 的 agent_adapter（须在本轮复述目录名）"
        portable: "4=保持当前 config 中的 adapter（须复述目录名）"

  - id: init.populated_diff
    skill: "00-framework-init"
    class: gate
    ssot_anchor: "user-confirmation-ux.md §3.1"
    skill_step: "§0.3.4"
    portable_menu: "1=all=y 2=all=n 3=逐项指定(Q1=y …)"
    notes: "保留 Q1=y 严谨性；gate 1/2 映射 all=y/all=n"
    options:
      - value: all_y
        label: "全部覆盖 — 等价 all=y"
        portable: "1=all=y"
      - value: all_n
        label: "全部跳过 — 等价 all=n"
        portable: "2=all=n"
      - value: per_item
        label: "逐项指定 — 使用 Q1=y … 格式"
        portable: "3=逐项指定(Q1=y …)"

  - id: init.project_profile
    skill: "00-framework-init"
    class: enum
    ssot_anchor: "user-confirmation-ux.md §3.2"
    skill_step: "§1.6"
    portable_menu: "用户给出 project_profile.name 字符串或编号选 preset"
    options:
      - value: preset
        label: "选择 preset — 从 profile 列表编号选择"
        portable: "1=选择 preset"
      - value: custom
        label: "自定义 — 给出 project_profile.name 字符串"
        portable: "2=自定义 name 字符串"

  - id: init.intra_layer_deps
    skill: "00-framework-init"
    class: gate
    ssot_anchor: "user-confirmation-ux.md §3.1"
    skill_step: "Step 3.x"
    portable_menu: "1=全部按默认 2=调整某层 3=讨论语义"
    batch_shorthand: ["全部按默认", "all=default", "1"]
    options:
      - value: all_default
        label: "全部维持「当前值」列所示策略（等价于每层「按默认」）"
        portable: "1=全部按默认"
      - value: adjust_layers
        label: "我要调整某几层（进入 matrix 子菜单）"
        portable: "2=调整某层"
      - value: discuss
        label: "先讨论 forbid / dag / sublayer 语义"
        portable: "3=讨论语义"

  - id: init.intra_layer_deps.matrix
    skill: "00-framework-init"
    class: matrix
    ssot_anchor: "user-confirmation-ux.md §3.3"
    skill_step: "Step 3.x.1"
    parent: init.intra_layer_deps
    matrix_options:
      - value: default
        label: "按默认（当前值）"
        portable: "1=按默认"
      - value: dag
        label: "dag"
        portable: "2=dag"
      - value: forbid
        label: "forbid"
        portable: "3=forbid"
      - value: sublayer
        label: "sublayer（+ 子层问卷）"
        portable: "4=sublayer"

  - id: init.toolchain_path
    skill: "00-framework-init"
    class: enum
    ssot_anchor: "user-confirmation-ux.md §3.2"
    skill_step: "Step 5.6 / profile-addendum §5.6.3"
    portable_menu: "1=采用探测路径 2=自定义路径 3=跳过"
    options:
      - value: detected
        label: "采用探测路径 — 使用 check-init 探测到的工具链路径"
        portable: "1=采用探测路径"
      - value: custom
        label: "自定义路径 — 我要指定工具链安装路径"
        portable: "2=自定义路径"
      - value: skip
        label: "跳过 — 本轮不写入工具链路径"
        portable: "3=跳过"

  - id: init.create_downgrade
    skill: "00-framework-init"
    class: enum
    ssot_anchor: "user-confirmation-ux.md §3.2"
    skill_step: "CREATE→UPDATE 降级"
    portable_menu: "y=继续 UPDATE / N=保持 CREATE"
    options:
      - value: continue_update
        label: "继续 UPDATE — 已有 config，走升级模式"
        portable: "y=继续 UPDATE"
      - value: keep_create
        label: "保持 CREATE — 仍按首次落地处理"
        portable: "N=保持 CREATE"

  # --- Skill 0 catalog ---
  - id: catalog.staging_module
    skill: "0-catalog-bootstrap"
    class: enum
    ssot_anchor: "user-confirmation-ux.md §3.2"
    skill_step: "Phase A Step 5"
    portable_menu: "1=y确认 2=e修改 3=s跳过 4=q作废"
    options:
      - value: confirm
        label: "确认 — 按当前 staging 汇总写入 catalog / glossary"
        portable: "1=y确认"
      - value: edit
        label: "修改 — 我要调整 staging 内容后再确认"
        portable: "2=e修改"
      - value: skip
        label: "跳过 — 本模块/词条本轮不写入"
        portable: "3=s跳过"
      - value: void
        label: "作废 — 放弃本轮 staging"
        portable: "4=q作废"

  - id: catalog.staging_glossary
    skill: "0-catalog-bootstrap"
    class: enum
    ssot_anchor: "user-confirmation-ux.md §3.2"
    skill_step: "Phase B Step 3"
    portable_menu: "1=y确认 2=e修改 3=s跳过 4=q作废"
    options:
      - value: confirm
        label: "确认 — 按当前 staging 汇总写入 catalog / glossary"
        portable: "1=y确认"
      - value: edit
        label: "修改 — 我要调整 staging 内容后再确认"
        portable: "2=e修改"
      - value: skip
        label: "跳过 — 本模块/词条本轮不写入"
        portable: "3=s跳过"
      - value: void
        label: "作废 — 放弃本轮 staging"
        portable: "4=q作废"

  - id: catalog.seed_tech_word
    skill: "0-catalog-bootstrap"
    class: enum
    ssot_anchor: "user-confirmation-ux.md §3.2"
    skill_step: "glossary 种子守门"
    portable_menu: "1=删词 2=改自然语言 3=allowlist"
    options:
      - value: delete
        label: "删词 — 从种子清单移除该词"
        portable: "1=删词"
      - value: rephrase
        label: "改自然语言 — 修改词条表述"
        portable: "2=改自然语言"
      - value: allowlist
        label: "allowlist — 保留为技术词并登记"
        portable: "3=allowlist"

  # --- Skill 1 PRD ---
  - id: prd.feature_path
    skill: "1-prd-design"
    class: enum
    ssot_anchor: "user-confirmation-ux.md §3.2"
    skill_step: "前置路径检查"
    portable_menu: "1=换 feature 名 2=清理/恢复路径"
    options:
      - value: rename_feature
        label: "换 feature 名 — 使用新的 feature 目录名"
        portable: "1=换 feature 名"
      - value: fix_path
        label: "清理或恢复路径 — 修复 doc/features 下冲突路径"
        portable: "2=清理/恢复路径"

  - id: prd.terminology
    skill: "1-prd-design"
    class: artifact_checkbox
    ssot_anchor: "user-confirmation-ux.md §3.4"
    skill_step: "Step 1.5"
    portable_menu: "1=全部确认high行 2=逐行确认 3=逐行修改"
    artifact: "PRD.md ## 0. 术语映射表 [x]"
    harness: check-prd terminology_mapping_table
    options:
      - value: all_confirm
        label: "全部确认 — 所有行写回 PRD [x]，进入后续 PRD 步骤"
        portable: "1=全部确认 high 行"
        side_effect: "写回 PRD 术语映射表 [x] 列"
      - value: row_by_row
        label: "逐行确认 — 逐条确认，有问题可修改"
        portable: "2=逐行确认"
      - value: row_edit
        label: "逐行修改映射 — 我要修改部分术语映射"
        portable: "3=逐行修改"
    matrix_options:
      - value: confirm_row
        label: "确认该行 — 写回本行 [x]"
        portable: "1=确认该行"
        side_effect: "写回 PRD 术语映射表本行 [x]"
      - value: edit_row
        label: "改映射 — 修改本行权威模块或消歧"
        portable: "2=改映射"

  - id: prd.freeze
    skill: "1-prd-design"
    class: enum
    ssot_anchor: "user-confirmation-ux.md §3.2"
    skill_step: "Step 5 输出与归档"
    portable_menu: "1=冻结PRD可进Skill2 2=继续改PRD"
