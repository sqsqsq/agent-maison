# Framework builtin skills index (machine-readable SSOT)
# Consumed by resolveSkillPath() — do not duplicate id→path mapping elsewhere.
# schema_version: "1.0"

schema_version: "1.0"

skills:
  - id: framework-init
    scope: project
    source_rel: project/framework-init
    order: 0
    description: >
      接入或升级 Framework 配置与 agent 产物（项目级 init）

  - id: catalog-bootstrap
    scope: project
    source_rel: project/catalog-bootstrap
    order: 1
    description: >
      模块画像 catalog 与业务术语表 glossary 自举
    init_next_steps:
      - step_id: catalog-phase-a
        when: catalog_empty
        kind: optional
        priority: 10
        workflow_artifact: catalog
        invoke:
          neutral: "模块画像自举（Phase A）"
          command_id: catalog-bootstrap
      - step_id: glossary-phase-b
        when: glossary_empty
        kind: optional
        priority: 20
        workflow_artifact: glossary
        invoke:
          neutral: "术语表自举（Phase B）"
          command_id: glossary-bootstrap

  - id: code-graph
    scope: project
    source_rel: project/code-graph
    order: 2
    description: >
      模块级 Code Graph 建图、策展 core 节点与 module-graph 漂移门禁
    init_next_steps:
      - step_id: graph-first-gap
        when: graph_gap
        kind: optional
        priority: 30
        workflow_artifact: module-graph
        invoke:
          neutral: "Code Graph 建图"
          command_id: code-graph
          param_hint: "<ModuleName>"

  - id: goal-mode
    scope: project
    source_rel: project/goal-mode
    order: 5
    description: >
      目标模式 goal-runner 薄入口（调用确定性编排器，非自驱动裁决）
    init_next_steps:
      - step_id: goal-optional
        when: always_optional
        kind: optional
        priority: 90
        invoke:
          neutral: "目标模式（goal-runner）"
          command_id: goal-mode
          param_hint: "<feature>"
          availability_note: "有明确 feature 目标时可使用"

  - id: spec
    scope: feature
    source_rel: feature/spec
    order: 10
    description: >
      spec 撰写
    init_next_steps:
      - step_id: feature-first-phase
        when: feature_ready
        kind: optional
        priority: 40
        workflow_artifact: spec
        invoke:
          neutral: "Feature Spec"
          command_id: spec

  - id: plan
    scope: feature
    source_rel: feature/plan
    order: 20
    description: >
      spec → plan（plan.md）
    init_next_steps:
      - step_id: feature-plan-phase
        when: feature_ready
        kind: optional
        priority: 35
        workflow_artifact: plan
        invoke:
          neutral: "Feature Plan"
          command_id: plan

  - id: coding
    scope: feature
    source_rel: feature/coding
    order: 30
    description: >
      按 plan / contracts 落地实现代码

  - id: code-review
    scope: feature
    source_rel: feature/code-review
    order: 40
    description: >
      代码审查报告

  - id: business-ut
    scope: feature
    source_rel: feature/business-ut
    order: 50
    description: >
      业务级 UT / DAG

  - id: device-testing
    scope: feature
    source_rel: feature/device-testing
    order: 60
    description: >
      真机测试计划与报告
