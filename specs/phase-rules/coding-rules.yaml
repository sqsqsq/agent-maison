# ============================================================================
# Coding 阶段规约 — profile 中立骨架（无 toolchain 细则）
# ============================================================================
# 宿主源码形态、资源系统、模块清单与构建描述等细则在 profile 叠加层：
#   framework/profiles/hmos-app/phase-rules-overlays/coding-rules.overlay.yaml
#
# 消费者：
#   - framework/harness/scripts/check-coding.ts
#   - framework/harness/prompts/verify-coding.md
# ============================================================================

phase: coding
version: "1.0"
applies_to: "**"

structure_checks: {}

semantic_checks: {}

traceability_checks: {}

exploration_thresholds:
  min_files_inspected: 6
  min_source_code_paths: 3
  min_searches: 4
  min_code_facts: 3
  require_subagent_when_contract_files_gt: 5
  exploration_mode_allowed:
    - subagent
    - sequential
