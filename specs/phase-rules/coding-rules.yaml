# ============================================================================
# Coding 阶段规约 — profile 中立骨架（无 toolchain 细则）
# ============================================================================
# 宿主源码形态、资源系统、模块清单与构建描述等细则在 profile 叠加层：
#   framework/profiles/hmos-app/phase-rules-overlays/coding-rules.overlay.yaml
#
# 消费者：
#   - framework/harness/scripts/check-coding.ts
#   - framework/harness/prompts/verify-coding.md
# ============================================================================

phase: coding
version: "1.0"
applies_to: "**"

structure_checks: {}

semantic_checks: {}

traceability_checks: {}

exploration_thresholds:
  min_files_inspected: 6
  min_source_code_paths: 3
  min_searches: 4
  min_code_facts: 3
  require_subagent_when_contract_files_gt: 5
  exploration_mode_allowed:
    - subagent
    - sequential

# --------------------------------------------------------------------------
# Context Exploration 触发策略（v2.10 — coding default-on subagent）
# --------------------------------------------------------------------------
exploration_strategy:
  default_mode: subagent
  trivial_exemption:
    enabled: true
    conditions_any:
      - intent: [rename, extract_function, move_file, typo_fix]
      - prd_loc_delta_lt: 30
      - single_function_scope: true
  scoring:
    threshold: 60
    dimensions:
      - id: module_loc
        weight: 25
        tiers:
          - { gte: 50000, score: 25 }
          - { gte: 20000, score: 15 }
          - { gte: 5000, score: 8 }
      - id: scope_breadth
        weight: 20
        tiers:
          - { gte: 3, score: 20 }
          - { gte: 2, score: 12 }
          - { gte: 1, score: 5 }
      - id: cross_layer
        weight: 20
        signal: touches_multiple_outer_layers
        score_if_true: 20
      - id: new_api_surface
        weight: 15
        signal: adds_exports_or_public_api
        score_if_true: 15
      - id: dependency_fan_out
        weight: 20
        tiers:
          - { gte: 10, score: 20 }
          - { gte: 5, score: 12 }
          - { gte: 2, score: 5 }
  sequential_multiplier: 2.0
  sequential_min_files_inspected_add: 5
