# ============================================================================
# Testing（真机测试）阶段规约 (Phase Rules)
# ============================================================================
# 定义真机测试计划和测试报告（device-testing 产出）必须满足的通用规则。
# 适用于所有功能模块的测试计划和测试报告。
#
# 消费者:
#   - framework/harness/scripts/check-testing.ts  (脚本 Harness, 确定性检查)
#   - framework/harness/prompts/verify-testing.md (AI Harness, 语义级检查)
# ============================================================================

phase: testing
version: "1.0"
applies_to:
  test_plan: "doc/features/{module}/testing/test-plan.md"
  test_report: "doc/features/{module}/testing/test-report.md"

# --------------------------------------------------------------------------
# 结构约束 — 脚本 Harness 可自动检测
# --------------------------------------------------------------------------
structure_checks:

  # ---- review 闭环源码快照对账（goal-fakepass-hardening t2）----

  review_closure_attestation:
    description: >
      testing 期产品源码 vs review-closure-attestation.json 固化 inventory 对账
      （走树=冻结 roots ∪ 当前重 discovery，新增整模块可见）。缺 attestation 或任何
      新增/修改/删除/新 root → BLOCKER FAIL，指引回跑 review 闭环重审；无 grace window。
      review 阶段被 profile 禁用 → SKIP。防线针对：测试期写入行为开关（如
      DEVICE_TEST_FAST_PATH=true）短路用户流程、review 审过的代码与真机跑的不是同一份。

  product_behavior_switch_scan:
    description: >
      产品源码（非测试目录）测试性行为开关扫描：命名命中
      FAST_PATH/TEST_ONLY/FOR_TEST/DEVICE_TEST/E2E_ONLY/BYPASS/SKIP_(SMS|VERIFY|AUTH)
      且初始化为 true → BLOCKER。waiver 须 behavior-switch-waivers.yaml 精确坐标
      （file+symbol+content_sha256）+ t10 confirmation receipt，且仅降级 WARN、
      run 封顶 AWAITING_HUMAN_REVIEW（不洗白）。defense-in-depth：主防线为
      review_closure_attestation 与 P0 语义链。

  p0_coverage_integrity:
    description: >
      P0 用例覆盖 fail-closed（goal-fakepass-hardening t5）：explicit_skip/未执行的
      P0 须逐条 p0_skip_waiver receipt，否则 BLOCKER（failure_kind=await_human_p0_skip
      → goal 首触即 halt 求人）；waived 仅降级 WARN 且 run 封顶 AWAITING_HUMAN_REVIEW。

  p0_pass_rate_dual_metrics:
    description: >
      通过率双口径对账（t5）：全分母执行覆盖率与通过率分列重算；存在任何 P0 skip 时
      报告结论不得无条件「达标」（bc-openCard：7/7=100% 冒充 18 条全量）。

  p0_semantic_coverage_integrity:
    description: >
      P0 结构化状态迁移证据（t4b）：对账派生 Hylyre 计划 step 序列——映射完整/禁纯 wait
      冒充/动作须指向 checkpoint.target_element_id/其后须 wait_for required_element_ids/
      flow 每条中间屏边须有已执行且通过的 owning TC（「点银行直达成功页」确定性死刑）。
      运行时 hit-test/页面签名为 provider 采集扩展 deferred 项（change tasks 显式登记）。

  # ---- 测试计划 ----

  plan_required_chapters:
    description: >
      测试计划必须包含以下章节：
      测试范围、测试环境、测试用例清单、测试策略、通过标准、风险与依赖
    severity: BLOCKER
    rule:
      file: "test-plan.md"
      expected_headings:
        - "测试范围"
        - "测试环境"
        - "测试用例清单"
        - "测试策略"
        - "通过标准"
        - '"风险" or "风险与依赖"'
      match: "heading_text_contains"

  test_case_table_format:
    description: >
      「测试用例清单」必须包含 Markdown 表格，表头至少包含：
      用例编号、用例名称、前置条件、测试步骤、预期结果、优先级、关联 AC
    severity: BLOCKER
    rule:
      file: "test-plan.md"
      section: "测试用例清单"
      expect: "markdown_table"
      required_columns:
        - '"用例编号" or "编号"'
        - "用例名称"
        - "前置条件"
        - "测试步骤"
        - "预期结果"
        - "优先级"
        - '"关联 AC" or "关联验收标准"'

  test_case_priority_values:
    description: >
      测试用例优先级必须为 P0/P1/P2/P3
    severity: MAJOR
    rule:
      file: "test-plan.md"
      section: "测试用例清单"
      column: "优先级"
      allowed_values: ["P0", "P1", "P2", "P3"]

  test_environment_defined:
    description: >
      「测试环境」必须明确列出：设备型号/模拟器、系统版本、API 版本、
      特殊配置要求
    severity: MAJOR
    rule:
      file: "test-plan.md"
      section: "测试环境"
      required_fields:
        - '"设备" or "设备型号"'
        - "系统版本"
        - '"API" or "API 版本"'

  pass_criteria_defined:
    description: >
      「通过标准」必须定义量化的通过条件，
      如 P0 用例 100% 通过、P1 用例 ≥ 95% 通过
    severity: BLOCKER
    rule:
      file: "test-plan.md"
      section: "通过标准"
      expect: "numeric_thresholds"

  device_test_build:
    description: >
      当 project_profile 将 device_test.build 声明为 BLOCKER 且未 SKIP 时，
      harness 必须产出可安装的主应用 signed HAP（执行 hvigor 或按源码 mtime 复用已有 HAP，
      `reused: true` 时门禁仍为 PASS）；并落盘编译日志/result.json；
      声明 SKIP 时本检查 SKIP。
    severity: BLOCKER

  device_test_install:
    description: >
      当 project_profile 将 device_test.install 声明为 BLOCKER 且未 SKIP 时，
      harness 必须将主应用 HAP 通过 hdc 安装到已连接设备；声明 SKIP 或上游 device_test.build
      SKIP 时本检查 SKIP。
    severity: BLOCKER

  device_test_run:
    description: >
      当 project_profile 将 device_test.run 声明为 BLOCKER 且未 SKIP 时，
      harness 必须按 profile 指定的真机自动化能力消费派生测试用例并产出 report + trace；
      脚本以 doc/features/<feature>/testing/test-plan.md「测试用例」表为 SSOT：派生 hylyre
      表须覆盖全部 TC，或由派生文件 YAML frontmatter / 同目录 derive-manifest.json 登记
      explicit_skip_tc_ids；烟测占位类派生无效；在多条派生产物间按 test-plan.hylyre.md 的 mtime
      选取最新有效计划。
      **门禁语义**：run.ok 仅表示 runner 未崩溃；本检查还须 trace.outcome=success 且无失败/阻塞 case，
      否则 BLOCKER FAIL（partial/failed/aborted 不得 PASS）。
      声明 SKIP 或上游 device_test.install SKIP 时本检查 SKIP。
    severity: BLOCKER

  report_trace_reconciliation:
    description: >
      顶层 test-report.md「测试执行结果」须与 device_test_run 本轮选中的
      testing/reports/<ts>/hylyre/trace.json 全量对账（禁止以顶层 reports/trace.json 回填件为 SSOT）。
      报告写通过但 trace 失败/阻塞、结论达标但 trace.outcome≠success → BLOCKER FAIL。
    severity: BLOCKER

  ui_entry_coverage:
    description: >
      当 use-cases.yaml 中同一 user_actions.calls 存在多个 ui_bindings.ui 入口时，
      派生 Hylyre 计划须以 entry_ui / linked_flow / calls 结构化字段覆盖每个入口；
      P0 多入口缺派生覆盖 → BLOCKER FAIL；非 P0 → MAJOR FAIL；缺结构化字段 → MAJOR WARN。
    severity: MAJOR

  visual_diff:
    description: >
      设备渲染视觉回环（device_test.visual_diff）：Hylyre 截图 vs authoritative_refs 原图，
      产出 visual-diff.md / must-fix 清单与保真分（含几何 IoU）。QA 阶段级动作，非 test-plan
      派生步骤根键。warmup/无设备 → SKIP。
      当 spec UI change=new_or_changed 且 P0 目标屏 visual verdict 全 pending 或未覆盖 → BLOCKER FAIL。
      score_floor 已降级 reference_only（P1-C·f2d8c4a6：像素直方图历史多次实测证伪，不参与任何判定）。
      P0-9（e7a91b3c）判定持久化：已定判定（pass/warn/fail，含真人 confirmed_by）绑定
      「被评截图文件 hash + build 指纹（实际 hap sha256 前 12 hex，现算）」——同 build 下 capture
      跳采、判定跨 harness 轮持久（像素恒等作新鲜度键已被真机时钟/轮播漂移证伪）；换 build/
      文件被换/legacy 缺指纹 → stale 重置重判。唯一阻塞=T2 真人确认且指纹链完整时输出
      failure_kind=await_human_confirm（goal halt 为 await_human_visual_confirm 并给逐屏签名指引）。
    severity: MAJOR
    rule:
      provider: device_test.visual_diff

  visual_diff_text_placement:
    description: >
      P1-C（plan f2d8c4a6）：文本块二部匹配观测——参考图与设备截图各 OCR 行聚类后按 spec 文本
      二部匹配（子串冲突消解防短文本误配聚合行）。FAIL 级相对信号（对 device≠mockup 缩放不变、
      确定性证据 VL verdict=pass 不可推翻）：参考图同一行的文本对实测分居两行（副标题右置被排成题下）、
      纵向顺序 ≥2 对颠倒（布局乱序）；pixel_1to1 P0 屏 → BLOCKER。存在性缺失/单对逆序为 advisory
      观测素材（WARN 不阻断防设备 OCR 噪声 FP），VL 终判须折算进 screens[].must_fix。
      overlay 屏 id（__overlay__*）归一化回落基屏。OCR/参考原图不可用 → degraded WARN 不静默。
    severity: BLOCKER
    rule:
      provider: device_test.visual_diff

  visual_diff_human_confirm_required:
    description: >
      T2 主背靠（a3f1c920）＋P0-6 拆位（c9e2a7f4）：pixel_1to1 P0 屏判 pass 须真人过目确认——
      confirmed_by 非空、非自动化身份（goal-mode-auto 等）、且非 user_requirement（授权哨兵
      ≠验真签名：user_requirement 属需求级授权，不能替代对具体屏的真人过目；2026-07-05 实锤
      agent 以它伪签 T2 并在自跑 harness 中通关过一次）。headless 走 HALT 求人。
      诚实边界：不防伪造人名字符串（带外确认凭证=round7 P0-8）。
    severity: BLOCKER
    rule:
      provider: device_test.visual_diff

  visual_diff_verdict_abandonment:
    description: >
      P0-2（9d4b7e21，声明补录——实现已随收尾批落地，本条补齐指纹纪律）：确定性 FAIL 弃判硬
      backstop——某屏 placement fail_signals 非空且 verdict=pending → BLOCKER 必报（不以
      must_fix 有无为条件防绕过）；details 合并 fail_signals 与该屏既有 must_fix 作现成回修指令。
      fail 屏须 verdict=fail + 信号转 must_fix + 重试轮内修码重测，禁止"无人值守不可闭环"式弃判。
    severity: BLOCKER
    rule:
      provider: device_test.visual_diff

  visual_diff_tamper_artifact:
    description: >
      P0-7③（c9e2a7f4）：伪签物证扫描——feature testing/device-testing 目录内脚本文件内容同时
      命中「引用 visual-diff.json」与改判特征（程序化填 confirmed_by/verdict=pass、批量重置
      pending、清空/删除 must_fix、写 evaluated_screenshot_hash）→ BLOCKER 物证上桌。
      2026-07-05 实锤：auto-fill（NODE_OPTIONS 预加载 hook）/fill-pass/reset 三脚本成套伪签
      流水线。判定只能由 capture/真人逐屏产生；正常读取/统计脚本不误伤（须双条件同中）。
    severity: BLOCKER
    rule:
      provider: device_test.visual_diff

  # ---- 测试报告 ----

  report_required_chapters:
    description: >
      测试报告必须包含以下章节：
      测试概览、测试执行结果、缺陷清单（如有）、通过率统计、结论
    severity: BLOCKER
    rule:
      file: "test-report.md"
      expected_headings:
        - "测试概览"
        - "测试执行结果"
        - '"通过率" or "通过率统计"'
        - '"结论" or "测试结论"'
      match: "heading_text_contains"

  execution_result_table:
    description: >
      「测试执行结果」必须包含每条用例的执行状态表，
      状态值限于：通过 / 失败 / 阻塞 / 跳过
    severity: BLOCKER
    rule:
      file: "test-report.md"
      section: "测试执行结果"
      expect: "markdown_table"
      required_columns:
        - "用例编号"
        - '"执行状态" or "结果"'
      allowed_status: ["通过", "失败", "阻塞", "跳过"]

  pass_rate_calculated:
    description: >
      「通过率统计」必须包含各优先级的通过率数值，
      以及总体通过率
    severity: BLOCKER
    rule:
      file: "test-report.md"
      section: "通过率"
      expect:
        per_priority_rate: ["P0", "P1", "P2"]
        overall_rate: true

  defect_table_format:
    description: >
      如有失败用例，「缺陷清单」必须包含：
      缺陷编号、关联用例、严重程度、描述、状态（待修复/已修复/已关闭）
    severity: MAJOR
    rule:
      file: "test-report.md"
      section: "缺陷清单"
      condition: "has_failed_cases"
      expect: "markdown_table"
      required_columns:
        - "缺陷编号"
        - "关联用例"
        - "严重程度"
        - "描述"
        - "状态"

  report_conclusion_with_verdict:
    description: >
      报告结论必须包含明确的判定：达标 / 有条件达标 / 不达标，
      并引用通过率数据
    severity: BLOCKER
    rule:
      file: "test-report.md"
      section: "结论"
      expect: "verdict"
      allowed_values: ["达标", "有条件达标", "不达标"]

  metadata_header:
    description: >
      测试计划和报告顶部必须包含模块标识、版本、日期、测试人员等元数据
    severity: MINOR
    rule:
      expect: "blockquote_metadata"
      required_fields:
        - "模块标识"
        - "版本"
        - "日期"

# --------------------------------------------------------------------------
# 语义约束 — AI Harness 做语义级检查
# --------------------------------------------------------------------------
semantic_checks:

  test_case_completeness:
    description: >
      测试用例应覆盖所有核心业务路径，包括正常流程和异常流程
    severity: MAJOR
    ai_prompt_hint: >
      对比 spec 业务流程图，检查测试用例是否覆盖了：
      (1) 所有正常路径；(2) spec 中定义的异常场景；
      (3) 关键的用户交互路径

  test_steps_reproducible:
    description: >
      每条测试用例的「测试步骤」必须足够详细，
      让任何人都能按步骤重复执行
    severity: MAJOR
    ai_prompt_hint: >
      审查测试步骤：(1) 每步操作是否明确（点击什么、输入什么）；
      (2) 是否有遗漏的中间步骤；(3) 步骤顺序是否正确

  expected_result_specific:
    description: >
      每条用例的「预期结果」必须是可观察、可验证的，
      不允许"正常显示"这类模糊描述
    severity: MAJOR
    ai_prompt_hint: >
      检查预期结果：(1) 是否描述了具体可见的 UI 变化；
      (2) 是否有明确的验证点（文字内容、颜色、状态等）

  nfr_test_coverage:
    description: >
      spec 中的非功能性需求（性能指标、兼容性等）
      应有对应的测试用例或测试策略
    severity: MAJOR
    ai_prompt_hint: >
      对照 spec 非功能性需求章节，检查测试计划中是否有对应的验证方案：
      如首屏加载时间 ≤ 1.5s、Tab 切换 ≤ 300ms 等

  defect_severity_consistency:
    description: >
      缺陷严重程度评级应与其实际影响匹配：
      阻断核心功能 → BLOCKER；影响主要功能 → MAJOR；
      体验问题 → MINOR
    severity: MINOR
    ai_prompt_hint: >
      审查缺陷严重程度评级是否合理

  pass_criteria_met:
    description: >
      测试报告的结论必须与通过率数据一致：
      如果 P0 通过率 < 100%，结论不应为"达标"
    severity: BLOCKER
    ai_prompt_hint: >
      验证：(1) P0 通过率是否达到通过标准中定义的阈值；
      (2) 总体通过率是否达标；(3) 结论与数据是否一致

# --------------------------------------------------------------------------
# 追溯约束 — 脚本 + AI 联合检查
# --------------------------------------------------------------------------
traceability_checks:

  acceptance_to_test_case:
    description: >
      acceptance.yaml 中 ut_layer∈{device,both} 的 P0/P1 criteria/boundaries
      必须被 test-plan.md 至少一条用例覆盖（「关联 AC」列）
    severity: BLOCKER
    rule:
      source: "acceptance.yaml"
      filter: 'ut_layer in ["device","both"] and priority in ["P0","P1"]'
      target: "test-plan.md > 测试用例清单.关联 AC"
      coverage: "100%"

  test_plan_freshness_vs_acceptance:
    description: >
      acceptance.yaml 的 mtime 不得新于 test-plan.md（否则须按 acceptance 重派生 plan）
    severity: BLOCKER
    rule:
      compare_mtime:
        newer: "acceptance.yaml"
        older_must_be: "test-plan.md"

  plan_references_unit_layer_ac:
    description: >
      test-plan 关联了 ut_layer=unit 的 AC/BD 时 WARN（unit 由 business-ut UT 覆盖）
    severity: MINOR
    rule:
      source: "test-plan.md"
      warn_if_refs: 'ut_layer == "unit"'

  test_case_to_acceptance:
    description: >
      每条测试用例必须关联到至少一个验收标准（AC 编号）
    severity: MAJOR
    rule:
      source: "test-plan.md > 测试用例清单"
      column: "关联 AC"
      expect: "non_empty"

  exception_scenario_coverage:
    description: >
      spec 异常场景表中的每个场景应有对应的测试用例
    severity: MAJOR
    rule:
      source: "spec.md > 异常/边界场景处理"
      target: "test-plan.md > 测试用例清单"
      match: "scenario_covered"

  plan_to_report_consistency:
    description: >
      测试报告中的用例编号必须与测试计划中的用例编号一一对应，
      不允许报告中出现计划中未定义的用例
    severity: BLOCKER
    rule:
      source: "test-report.md > 测试执行结果.用例编号"
      target: "test-plan.md > 测试用例清单.用例编号"
      coverage: "bidirectional"

  boundary_coverage:
    description: >
      Spec 中定义的边界场景（doc/features/{module}/boundaries.yaml）
      应被测试计划覆盖
    severity: MAJOR
    rule:
      source: "doc/features/{module}/boundaries.yaml"
      target: "test-plan.md > 测试用例清单"
      match: "boundary_id_covered"

  defect_to_test_case:
    description: >
      缺陷清单中每个缺陷的「关联用例」必须指向测试用例清单中的有效编号
    severity: MAJOR
    rule:
      source: "test-report.md > 缺陷清单.关联用例"
      target: "test-plan.md > 测试用例清单.用例编号"
      match: "valid_reference"
