# ============================================================================
# 业务级 UT 阶段规约 (Phase Rules) — v2
# ============================================================================
# v2 核心转变：
#   - UT 不再只做"单数据接口断言"，而要按 use-cases.yaml > branches 1:1
#     端到端驱动 UseCase（直接调 trigger 方法，spy 所有 ports）。
#   - UI 副作用（Toast/Nav）不进 UT，由 Skill 6 消费 device-testing-todo.md。
#   - DAG/UT 用例必须双向追溯到 AC（ut_layer in unit/both）或 branch。
#
# 消费者:
#   - framework/harness/scripts/check-ut.ts  (脚本 Harness, 确定性检查)
#   - framework/harness/prompts/verify-ut.md (AI Harness, 语义级检查)
# ============================================================================

phase: ut
version: "2.0"
applies_to:
  use_cases_spec: "doc/features/{feature}/use-cases.yaml"
  dag_files: "{module}/test/dag/**/*.yaml"
  ut_files: "{module}/src/ohosTest/ets/test/**/*.test.ets"
  device_todo: "doc/features/{feature}/device-testing-todo.md"

# --------------------------------------------------------------------------
# 结构约束 — 脚本 Harness 可自动检测
# --------------------------------------------------------------------------
structure_checks:

  # -----------------------------------------------------------------
  # A. use-cases.yaml 自身的合规性（v2 新增）
  # -----------------------------------------------------------------

  usecase_spec_exists:
    description: >
      若 feature 的 design.md 声明存在业务流程 UseCase（acceptance.yaml 中
      任何 AC 的 ut_layer 为 unit/both，或 design.md 出现「业务流程 UseCase 清单」
      章节），则 doc/features/{feature}/use-cases.yaml 必须存在。
      若文件不存在，视为未完成 Skill 2 的 Step 6/11——WARN + SKIP 后续 A/B 组检查。
    severity: BLOCKER
    rule:
      required_if_any_of:
        - "acceptance.yaml has criteria[].ut_layer in [unit, both]"
        - "design.md contains '业务流程 UseCase 清单'"
      path: "doc/features/{feature}/use-cases.yaml"

  usecase_spec_schema:
    description: >
      use-cases.yaml 必须符合 Schema：schema_version / feature / use_cases[]；
      每个 use_case 包含 id / class / file / triggers / ports / state_model / branches。
    severity: BLOCKER
    rule:
      for_each_use_case:
        required_fields: ["id", "class", "file", "triggers", "ports", "state_model", "branches"]
        triggers_each_required: ["event", "params"]
        ports_each_required: ["name", "type", "ownership", "methods"]
        branches_each_required: ["id", "scenario", "linked_acceptance"]
      ports_ownership_enum: ["cloud", "local"]

  usecase_port_matches_contracts:
    description: >
      use-cases.yaml > ports[].type 必须在 contracts.yaml > interfaces[].class 中
      找到同名接口（确保 UseCase 注入的端口就是 design 阶段声明的接口）。
    severity: MAJOR
    rule:
      for_each_port:
        validate: "port.type in contracts.yaml > interfaces[].class"

  usecase_class_exists:
    description: >
      use-cases.yaml > use_cases[].file 指向的源文件必须存在，且在其中能找到
      与 class 字段同名的 ArkTS class 定义。
    severity: BLOCKER
    rule:
      for_each_use_case:
        - file_exists: "{use_case.file}"
        - class_defined_in_file: "{use_case.class}"

  usecase_class_pure:
    description: >
      UseCase 源文件（use-cases.yaml > use_cases[].file）禁止 import 任何
      UI / 导航 / Toast 符号：@Component / @Consume / NavPathStack / $r /
      showToast / getUIContext / @kit.ArkUI / @aspect/CommUI。
      这是 UT 能够在 Hypium 里脱离 ArkUI runtime 端到端测试 UseCase 的前提。
    severity: BLOCKER
    rule:
      for_each_use_case_file:
        forbid_import_matching_any_of:
          - '@Component\b'
          - '@Entry\b'
          - '@Preview\b'
          - '@Consume\b'
          - '@Provide\b'
          - '\bNavPathStack\b'
          - '\bNavDestination\b'
          - '@kit\.ArkUI'
          - '\$r\('
          - 'getUIContext'
          - 'PromptAction'
          - 'showToast'
          - '@aspect/CommUI'

  # -----------------------------------------------------------------
  # B. DAG 与 use-cases.yaml 的结构一致性（v2 新增/修订）
  # -----------------------------------------------------------------

  dag_schema_compliance:
    description: >
      DAG 文件必须符合 DAG Schema v2：除原有必填字段外，新增 use_case
      （指向 use-cases.yaml > use_cases[].class）与 branches（该 UseCase 覆盖的分支 id 列表）。
    severity: BLOCKER
    rule:
      for_each_dag_file:
        required_fields:
          - "flow_id"
          - "flow_name"
          - "use_case"          # v2 新增
          - "branches"          # v2 新增
          - "entry_point"
          - "nodes"
        nodes_each_required:
          - "id"
          - "type"
          - "description"

  dag_node_type_valid:
    description: >
      DAG 节点的 type 必须来自 v2 枚举集。
      v2 新增：user_trigger / port_call_cloud / port_call_local / state_transition。
      v2 保留：code_execution / async_call / user_intervention /
      background_task / ui_navigation / assertion / conditional_branch。
      （user_intervention / ui_navigation 仍然允许用于兼容，但 Skill 5 建议
      迁移到更精确的 user_trigger 与交由 Skill 6 的设备层。）
    severity: BLOCKER
    rule:
      for_each_dag_node:
        field: "type"
        allowed_values:
          - "code_execution"
          - "async_call"
          - "user_intervention"
          - "background_task"
          - "ui_navigation"
          - "assertion"
          - "conditional_branch"
          - "user_trigger"        # v2
          - "port_call_cloud"     # v2
          - "port_call_local"     # v2
          - "state_transition"    # v2

  dag_acyclic:
    description: >
      DAG 必须是有向无环图，不允许存在循环引用（next 链不可回指）
    severity: BLOCKER
    rule:
      for_each_dag_file:
        validate: "topological_sort_possible"

  dag_source_file_exists:
    description: >
      DAG 节点的 source.file 引用的文件路径必须在工程中存在
    severity: BLOCKER
    rule:
      for_each_dag_node:
        if_has: "source.file"
        check: "file_exists_on_disk"

  dag_linked_usecase:
    description: >
      DAG 的 use_case 必须在 use-cases.yaml > use_cases[].class 中存在；
      DAG 的 branches[] 必须全部在该 UseCase 的 branches[].id 中存在。
    severity: BLOCKER
    rule:
      for_each_dag_file:
        - use_case_in_spec: true
        - branches_all_in_spec: true

  dag_assertion_linked_branch:
    description: >
      DAG 中 type=assertion 的节点必须声明 linked_branch（或至少 linked_acceptance
      能够被 acceptance.yaml 中某条 AC 的 linked_branch 反查到），确保 UT 生成时
      能对应到具体分支。
    severity: MAJOR
    rule:
      for_each_dag_node:
        filter: 'type == "assertion"'
        require_any_of:
          - field: "linked_branch"
            non_empty: true
          - field: "linked_acceptance"
            each_reverse_mapped_to_branch: true

  # -----------------------------------------------------------------
  # C. UT 代码合规（v2 新增/修订）
  # -----------------------------------------------------------------

  ut_file_naming:
    description: >
      UT 文件命名必须以 .test.ets 结尾，文件名应反映对应的业务流程或 UseCase 名。
    severity: MAJOR
    rule:
      for_each_ut_file:
        expect: "filename_ends_with"
        suffix: ".test.ets"

  ut_framework_import:
    description: >
      UT 文件必须导入 @ohos/hypium 并使用 describe/it 结构。
    severity: BLOCKER
    rule:
      for_each_ut_file:
        must_import_from: "@ohos/hypium"
        must_contain: ["describe(", "it("]

  ut_assertion_exists:
    description: >
      每个 it() 测试用例中必须包含至少一条 expect 断言。
    severity: BLOCKER
    rule:
      for_each_test_case:
        min_assertions: 1

  no_ui_dep_in_ut:
    description: >
      UT 文件禁止 import 任何 UI / 导航 / Toast 符号。白名单：
      @ohos/hypium、被测 UseCase 及其源文件依赖的 data/model / data/repository、
      同目录下的 spy/ SpyPort 实现。
      这是把"UI 交互"彻底隔离到 Skill 6 设备层的硬约束。
    severity: BLOCKER
    rule:
      for_each_ut_file:
        forbid_import_matching_any_of:
          - '@Component\b'
          - '@Entry\b'
          - '\bNavPathStack\b'
          - '\bNavDestination\b'
          - '@kit\.ArkUI'
          - '\$r\('
          - 'getUIContext'
          - 'showToast'
          - '@aspect/CommUI'

  ports_all_stubbed:
    description: >
      UseCase 在 use-cases.yaml 中声明的每个 port，对应 UT 文件中必须
      通过构造器注入一个 Spy/Stub/Fake 实现（即：有一个名为 Spy{PortType}
      或 Fake{PortType} 的 class 被 new 出来并传入 UseCase 构造器）。
    severity: BLOCKER
    rule:
      for_each_use_case:
        for_each_port:
          expect_in_ut_file_any_of:
            - 'new\s+Spy{port.type}\('
            - 'new\s+Fake{port.type}\('
            - 'new\s+Stub{port.type}\('

  it_name_has_ac_or_branch_tag:
    description: >
      每条 it() 的用例名称必须以 [AC-X] 或 [BRANCH-<id>] 起始标签（两者可组合），
      以便 AI/人肉眼即可看到与验收/分支的追溯关系。
    severity: BLOCKER
    rule:
      for_each_test_case:
        name_matches_any_of:
          - '^\[AC-[^\]]+\]'
          - '^\[BRANCH-[^\]]+\]'

  it_drives_flow:
    description: >
      每条 it() 的用例体应"端到端驱动"UseCase：
      至少包含 ≥2 次 port 调用（可通过 callLog 断言或 Spy 方法计数判定），
      且 ≥2 处 state 断言（useCase.state.* 相关 expect）。
      这是把"单数据接口测试"升级为"端到端业务流测试"的量化门槛。
    severity: MAJOR
    rule:
      for_each_test_case:
        min_port_call_assertions: 2
        min_state_assertions: 2
      note: >
        弱模型兜底：当 UT 中存在显式的 `.callLog` 或 `.calls` 断言、
        且存在 ≥2 处 `useCase.state.\w+` 访问时视为通过。

  dag_cohesion:
    description: >
      同一个 UseCase 的所有 DAG 必须共享 use_case 字段且 branches 交集为空、
      并集 ⊇ use-cases.yaml > branches 中除被标注 device_only 的分支外的全部。
      （允许一个 UseCase 拆多个 DAG 文件以便阅读；但不允许分支"漏掉"或"重复"）
    severity: MAJOR
    rule:
      for_each_use_case:
        dag_group_by_use_case:
          branches_no_overlap: true
          branches_cover_all_non_device_only: true

# --------------------------------------------------------------------------
# 语义约束 — AI Harness 做语义级检查
# --------------------------------------------------------------------------
semantic_checks:

  state_model_completeness:
    description: >
      use-cases.yaml > state_model.phases 是否足以表达所有业务分支；
      是否遗漏了 WaitingSms / Verifying / Persisting 等关键中间态；
      expected_phase_sequence 与 phases 集合是否一致。
    severity: MAJOR
    ai_prompt_hint: >
      对照 PRD 流程图、design.md 状态机与 use-cases.yaml > branches，
      判断 state_model 是否存在"多个分支共用一个过载态"或"缺必要中间态"。

  port_abstraction_quality:
    description: >
      ports 的抽象粒度是否合理：同一网络行为是否被拆成多条云端口、
      是否存在把 UI 抽象当 port（错误）、本地与云端口是否分离、
      方法签名是否与 contracts.yaml 一致。
    severity: MAJOR
    ai_prompt_hint: >
      审查 ports：(1) 是否出现 NavPathStack/Toast 等 UI 伪装成 port；
      (2) 云/本地边界是否清晰；(3) 是否与 contracts.yaml > interfaces 1:1。

  end_to_end_driving:
    description: >
      UT 中每条 it() 是否真的在"驱动完整链路"——不是仅调一次 repo 方法
      做数据条数断言，而是按 use-cases.yaml > branches 的 setup / triggers /
      expected_port_calls / expected_state 做端到端编排与断言。
    severity: BLOCKER
    ai_prompt_hint: >
      审查每条 it()：(1) 是否通过 useCase 的 trigger 方法驱动；
      (2) 是否对 Spy 的 callLog 做序列断言；(3) 是否对 useCase.state 做多阶段断言。
      若任一条回答"否"，视为 BLOCKER FAIL。

  branch_coverage_semantic:
    description: >
      use-cases.yaml > branches 是否涵盖了 PRD 中所有异常场景（network / validate
      fail / persist fail / user cancel 等），而不是只列了 happy + 单一失败。
    severity: MAJOR
    ai_prompt_hint: >
      对比 PRD 异常场景表 与 use-cases.yaml > branches，列出未覆盖的异常路径。

  device_ac_delegation:
    description: >
      对于 acceptance.yaml 中 ut_layer in [device, both] 的 AC/BD，
      doc/features/{feature}/device-testing-todo.md 必须出现对应条目
      （或 Skill 6 的 test-plan.md 已出现），确保没有 AC"两层都没人测"。
    severity: MAJOR
    ai_prompt_hint: >
      逐条比对：device/both 的 AC 是否在 device-testing-todo.md 中有 checklist
      或任务条目引用其 id。未引用的 AC 列为 gap。

  mock_reasonableness:
    description: >
      Spy 的预设返回值是否与数据模型一致（字段、类型、值域合理），
      错误路径的 throw/fail 是否模拟了真实错误码（VAL_ERR / SMS_ERR / PERSIST_ERR 等）。
    severity: MAJOR
    ai_prompt_hint: >
      检查 SpyPort 预设值与 data/model 定义是否吻合；错误码是否能在 UseCase
      源码中找到对应 fail(code) 调用。

  test_isolation:
    description: >
      每条 UT 用例必须独立：beforeEach 重建 Spy 与 UseCase，不跨用例共享状态。
    severity: MAJOR
    ai_prompt_hint: >
      检查 describe 块：(1) beforeEach 是否重建 api/storage/useCase；
      (2) 是否存在共享 let 变量被跨用例修改。

# --------------------------------------------------------------------------
# 追溯约束 — 脚本 + AI 联合检查
# --------------------------------------------------------------------------
traceability_checks:

  branch_coverage_full:
    description: >
      use-cases.yaml 中每个 UseCase 的所有 branches，在 UT 中都必须
      至少有一个 it() 与之对应（通过 [BRANCH-<id>] 标签识别，或 it() 内部
      引用了该 branch 名也可以）。缺失视为 BLOCKER。
    severity: BLOCKER
    rule:
      for_each_use_case:
        for_each_branch:
          expect_test_case_any_of:
            - 'name matches \[BRANCH-{branch.id}\]'
            - 'body contains "{branch.id}"'

  ut_case_per_unit_ac:
    description: >
      acceptance.yaml 中 ut_layer in [unit, both] 且 priority in [P0, P1] 的每条 AC/BD，
      在 UT 中都必须能找到一个 it()，它的名称或 linked_branch 能追溯到该 AC。
    severity: BLOCKER
    rule:
      source: "acceptance.yaml > criteria + boundaries"
      filter: 'ut_layer in ["unit","both"] and priority in ["P0","P1"]'
      target: "UT it() cases"
      coverage: "100%"
      matching:
        any_of:
          - 'it name matches \[AC-{ac.id}\]'
          - 'ac.linked_flow + linked_branch maps to an it() via BRANCH tag'

  acceptance_coverage:
    description: >
      P0/P1 验收标准的 UT 覆盖率（v2 修订：分母只计 ut_layer in [unit, both]
      的 AC；ut_layer = device 的 AC 不再纳入 UT 分母，交 Skill 6 负责）。
    severity: BLOCKER
    rule:
      source: "acceptance.yaml > criteria"
      filter: 'priority in ["P0","P1"] and ut_layer in ["unit","both"]'
      target: "UT it() cases"
      coverage: "100%"

  dag_to_source:
    description: >
      DAG 中每个非 assertion 节点的 source.file + source.function 必须
      能在实际代码中找到对应的文件和函数。
    severity: BLOCKER
    rule:
      for_each_dag_node:
        filter: 'type != "assertion"'
        if_has: "source"
        checks:
          - field: "source.file"
            expect: "file_exists"
          - field: "source.function"
            expect: "function_exists_in_file"

  boundary_coverage:
    description: >
      acceptance.yaml > boundaries 中 ut_layer in [unit, both] 的每条边界
      都应有对应的 UT 用例或 DAG 分支。
    severity: MAJOR
    rule:
      source: "acceptance.yaml > boundaries"
      filter: 'ut_layer in ["unit","both"]'
      target: "UT it() cases OR use-cases.yaml > branches"
      coverage: "100%"
