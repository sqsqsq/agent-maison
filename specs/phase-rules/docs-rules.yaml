# ============================================================================
# Docs 阶段规约 (Phase Rules) — framework 对外文档新鲜度
# ============================================================================
# 校验对象: framework/docs/**.md（由 framework/docs/DOC_INVENTORY.yaml 声明）
#
# 与 catalog/glossary 类似，docs 是"全局阶段"：不归属任何 feature。
# 校验形态：基于 git log 时间戳，比较"被关心的源文件"和"对应文档"哪个更新。
#
# 消费者:
#   - framework/harness/scripts/check-docs.ts  (脚本 Harness)
# ============================================================================

phase: docs
version: "1.0"
applies_to: "framework/docs/**"

# --------------------------------------------------------------------------
# 结构约束
# --------------------------------------------------------------------------
structure_checks:

  inventory_exists:
    description: >
      framework/docs/DOC_INVENTORY.yaml 必须存在且为合法 YAML。
    severity: BLOCKER
    rule:
      path: "framework/docs/DOC_INVENTORY.yaml"
      must_be_parseable: true

  inventory_schema_valid:
    description: >
      inventory 根对象需包含 schema_version (string) 与 docs (array)。
      docs 数组每项需有 path / role / sources。
    severity: BLOCKER
    rule:
      required_root_keys:
        - "schema_version"
        - "docs"
      doc_required_fields:
        - "path"
        - "role"
        - "sources"

  doc_files_exist:
    description: >
      inventory.docs[].path 列出的所有 markdown 文件必须存在于仓库内。
    severity: MAJOR
    rule:
      check_kind: "file_existence"
      target: "doc.path"

  skill_body_max_lines:
    description: >
      每个 skills/**/SKILL.md 主干（不含 skills/reference/ 下的条件加载 reference 文件）
      不得超过预算行数。基准 150 行；per-skill 覆写须在本文件 overrides 显式声明并附理由。
      C3-task2 台账拍板（2026-07-08）：framework-init / business-ut / catalog-bootstrap
      三个 skill 因流程复杂度/事故派生规则密度显著高于其它 7 个，批准 ≤250 行档。
    severity: BLOCKER
    rule:
      default_budget: 150
      overrides:
        - skill: framework-init
          budget: 250
          reason: "S0-S6 全流程 + adapter 物化矩阵 + portable fallback 规则密度高，C3a 台账批准"
        - skill: business-ut
          budget: 250
          reason: "三路径路由 + 两处 HARD STOP + 两条代码路径示例，全仓最复杂 skill，C3a 台账批准"
        - skill: catalog-bootstrap
          budget: 250
          reason: "Phase A/B 双阶段 + CREATE/UPDATE 双模式，C3a 台账批准（实际瘦身后已远低于预算）"

  forced_full_read_blacklist:
    description: >
      skill 正文不得新增「完整阅读 <文件>（BLOCKER）」类无条件强制全读指令
      （动词+单一文件引用后紧跟 BLOCKER 标记、不含任何条件触发语）；
      深层细则须以「当 <场景> 时读 <文件>」的条件加载形式引用。
      allowlist 内 file+reason 视为已知豁免，其余一律 FAIL。
    severity: BLOCKER
    rule:
      allowlist: []

  correction_layer_unconditional_confirm:
    description: >
      skill 正文若提及 "correction.layer ... 确认"，同一文件内必须同时提及
      auto_confirm_eligible（balanced 高置信免确认分支，C5-full）——否则视为
      把 correction.layer 用户确认写成无条件停等，与 --correction-init 落盘的
      .current-correction.json.auto_confirm_eligible 机读依据脱节（codex review
      发现：弱模型按 skill 正文执行时会无视该字段直接停等）。
      allowlist 内 file+reason 视为已知豁免，其余一律 FAIL。
    severity: BLOCKER
    rule:
      allowlist: []

  entry_template_budget:
    description: >
      templates/AGENTS.md.template（实例根入口模板）不得超过 120 行，
      且须含 L0/L1/L2 分流路由表、修正三问、红线清单三项骨架内容；
      行为细则须由 framework 内 skills/reference/ 承载。
    severity: BLOCKER
    rule:
      max_lines: 120
      required_markers:
        - "L0"
        - "L1"
        - "L2"
        - "修正三问"
        - "红线清单"

# --------------------------------------------------------------------------
# 可追溯性约束（doc → source 关系）
# --------------------------------------------------------------------------
traceability_checks:

  doc_freshness:
    description: >
      对每份 inventory.docs[]：取该文档最近 git 提交的 timestamp 作为 doc_ts，
      取它声明的 sources[] 各自最近 git 提交的 timestamp 作为 src_ts。
      若任一 src_ts > doc_ts，标记 MAJOR：source 在 doc 之后改动过，doc 可能已过期。
      若全部 src_ts <= doc_ts，PASS。
    severity: MAJOR
    rule:
      compare_method: "git_log_last_commit_timestamp"
      stale_action: "MAJOR"
      empty_sources_action: "SKIP"
      missing_doc_action: "delegated_to_doc_files_exist"

  source_paths_resolvable:
    description: >
      inventory.docs[].sources[] 中列出的每条路径都必须在仓库内存在
      （文件或目录）。不存在则提醒维护者从 inventory 中移除或修正。
    severity: MAJOR
    rule:
      check_kind: "source_existence"

  profile_skill_assets_resolvable:
    description: >
      实例当前 project_profile 的 framework/profiles/<name>/skills/skill-assets.yaml
      存在且条目落盘；根 framework/skills/<skill>/SKILL.md 与同目录 prompts/*.md 内
      profile-skill-asset 引用可解析，且清单中每条路径在仓库中落盘；
      且上述 SKILL/prompts 文件中不应存在指向 framework/skills 树内缺失目标的相对 Markdown 链接
      （不扫描各 skill 下 templates/、reference/ 等示意骨架，以免误报）；
      亦不应在上述 SKILL/prompts 中硬编码 `profiles/hmos-app/`、`framework/profiles/hmos-app/` 等 **hmos-app** 物理路径
      （应使用 profile-skill-asset 占位符或 <project_profile.name> 说明）。
      此外（防"散文 vs 机器清单"漂移，机制级根治）：
      - G1：SKILL/prompts 内 `](....README.md#anchor)` 链接的目标 README 须存在且 anchor 对应标题须存在
        （拦"Profile skill asset protocol 协议链接指错 README 或锚点缺失"）。
      - G2：各 profile 的 skills/<skill>/profile-addendum.md 纳入门禁——其 profile-skill-asset 引用须按该
        profile 清单解析，残留的字面 framework/skills|profiles 路径须落盘；且**不得出现不带 framework/ 前缀的
        根 skill 树裸路径 skills/feature|project/<x>/**（这是历史"相对 skills/feature/<x>/"误导基准表头的形态，
        即便恰好指向真实目录也拦——根 skill 树资产用 framework/skills/ 逻辑路径，profile 资产用占位符）。
      - G3：profile 命令式产物（prompts/、templates/）不得硬编码他 profile（Q≠P）物理路径，
        亦不得硬编码本 profile 资产物理路径 profiles/<P>/skills/<x>/{templates,examples,reference}/...
        （均应改用 profile-skill-asset 占位符；addendum 解释性散文豁免）。
    severity: MAJOR
    rule:
      check_kind: "profile_skill_assets"

# --------------------------------------------------------------------------
# 语义约束（保留位置，未来可加 AI 复核）
# --------------------------------------------------------------------------
semantic_checks: {}
