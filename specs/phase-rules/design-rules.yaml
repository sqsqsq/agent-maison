# ============================================================================
# Design 阶段规约 — profile 中立骨架（无 toolchain 细则）
# ============================================================================
# 设计文档中与宿主 UI / 导航模型相关的措辞细则在叠加层：
#   framework/profiles/hmos-app/phase-rules-overlays/design-rules.overlay.yaml
#
# 消费者：
#   - framework/harness/scripts/check-design.ts
#   - framework/harness/prompts/verify-design.md
# ============================================================================

phase: design
version: "1.0"
applies_to: "doc/features/{module}/design/design.md"

structure_checks: {}

semantic_checks: {}

traceability_checks: {}

# --------------------------------------------------------------------------
# Context Exploration Gate 量化阈值（schema 1.1.0）
# --------------------------------------------------------------------------
exploration_thresholds:
  min_files_inspected: 8
  min_source_code_paths: 5
  min_searches: 5
  min_code_facts: 5
  require_subagent_when_scope_gte: 2
  exploration_mode_allowed:
    - subagent
    - sequential

# --------------------------------------------------------------------------
# Context Exploration 触发策略（v2.10 — design default-on subagent）
# --------------------------------------------------------------------------
exploration_strategy:
  default_mode: subagent
  trivial_exemption:
    enabled: true
    conditions_any:
      - intent: [rename, extract_function, move_file, typo_fix]
      - prd_loc_delta_lt: 30
      - single_function_scope: true
  scoring:
    threshold: 60
    dimensions:
      - id: module_loc
        weight: 25
        tiers:
          - { gte: 50000, score: 25 }
          - { gte: 20000, score: 15 }
          - { gte: 5000, score: 8 }
      - id: scope_breadth
        weight: 20
        tiers:
          - { gte: 3, score: 20 }
          - { gte: 2, score: 12 }
          - { gte: 1, score: 5 }
      - id: cross_layer
        weight: 20
        signal: touches_multiple_outer_layers
        score_if_true: 20
      - id: new_api_surface
        weight: 15
        signal: adds_exports_or_public_api
        score_if_true: 15
      - id: dependency_fan_out
        weight: 20
        tiers:
          - { gte: 10, score: 20 }
          - { gte: 5, score: 12 }
          - { gte: 2, score: 5 }
  sequential_multiplier: 2.0
  sequential_min_files_inspected_add: 5
