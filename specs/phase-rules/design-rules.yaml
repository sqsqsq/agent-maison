# ============================================================================
# Design 阶段规约 — profile 中立骨架（无 toolchain 细则）
# ============================================================================
# 设计文档中与宿主 UI / 导航模型相关的措辞细则在叠加层：
#   framework/profiles/hmos-app/phase-rules-overlays/design-rules.overlay.yaml
#
# 消费者：
#   - framework/harness/scripts/check-design.ts
#   - framework/harness/prompts/verify-design.md
# ============================================================================

phase: design
version: "1.0"
applies_to: "doc/features/{module}/design.md"

structure_checks: {}

semantic_checks: {}

traceability_checks: {}

# --------------------------------------------------------------------------
# Context Exploration Gate 量化阈值（schema 1.1.0）
# --------------------------------------------------------------------------
exploration_thresholds:
  min_files_inspected: 8
  min_source_code_paths: 5
  min_searches: 5
  min_code_facts: 5
  require_subagent_when_scope_gte: 2
  exploration_mode_allowed:
    - subagent
    - sequential
